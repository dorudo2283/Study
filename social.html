<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社会 | 一問一答マスター</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Yu Gothic",sans-serif;}
body{background:#eef3f8;}
header{
  height:60px;
  background:#66bb6a; /* 社会のテーマカラー：グリーン */
  color:#fff;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
}
header a{
  color:white;
  text-decoration:none;
  font-weight:bold;
}
.point{
  background:white;
  color:#66bb6a;
  padding:8px 15px;
  border-radius:10px;
  font-weight:bold;
}
main{
  max-width:900px;
  margin:25px auto;
  padding:20px;
}
h1{
  text-align:center;
  margin-bottom:20px;
}

.menu{
  text-align:center;
}

.settings {
  margin-bottom: 20px;
  background: white;
  padding: 15px;
  border-radius: 10px;
  display: inline-block;
}
.settings select {
  padding: 5px 10px;
  font-size: 16px;
  border-radius: 5px;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#66bb6a;
  color:white;
  margin:6px;
  font-size:17px;
}

button:hover{
  background:#43a047;
}

#game, #final-result {
  display:none;
}

.progressText{
  font-weight:bold;
  margin-bottom:8px;
}

.progress{
  width:100%;
  height:18px;
  background:#cfd8dc;
  border-radius:20px;
  overflow:hidden;
  margin-bottom:20px;
}

#bar{
  width:0%;
  height:100%;
  background:#43a047;
  transition:.3s;
}

.question{
  font-size:25px;
  font-weight:bold;
  margin:20px 0;
}

.choice{
  display:block;
  width:100%;
  margin:10px 0;
  padding:14px;
  background:white;
  color:#222;
  border:2px solid #66bb6a;
  border-radius:10px;
  cursor:pointer;
  text-align:left;
  font-size:18px;
}

.choice:hover{
  background:#e8f5e9;
}

.correct{
  background:#43a047!important;
  color:white;
}

.wrong{
  background:#e53935!important;
  color:white;
}

#result{
  font-size:28px;
  font-weight:bold;
  margin-top:15px;
}

#explain{
  margin-top:15px;
  background:#fff;
  padding:15px;
  border-left:5px solid orange;
}

#next{
  display:none;
  width:100%;
  margin-top:20px;
}

#final-result {
  text-align: center;
  background: white;
  padding: 30px;
  border-radius: 10px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}
.result-stats {
  font-size: 22px;
  margin: 15px 0;
  font-weight: bold;
}
.result-rate {
  font-size: 28px;
  color: #e53935;
  margin: 15px 0;
  font-weight: bold;
}
.result-point {
  font-size: 20px;
  color: #66bb6a;
  margin-bottom: 20px;
}
</style>

</head>
<body>

<header>
  <div>📚 一問一答マスター</div>
  <div>
    <a href="index.html">🏠ホーム</a>
    <span class="point">⭐ <span id="point">0</span>P</span>
  </div>
</header>

<main>

<h1>🌏 社会</h1>

<div class="menu" id="menu">

  <div class="settings">
    <label for="q-count"><b>出題数：</b></label>
    <select id="q-count">
      <option value="1">1問</option>
      <option value="5" selected>5問</option>
      <option value="10">10問</option>
      <option value="20">20問</option>
      <option value="30">30問</option>
      <option value="40">40問</option>
      <option value="50">50問</option>
      <option value="75">75問</option>
      <option value="100">100問</option>
    </select>
  </div>

  <h2>分野・学年を選択してスタート</h2>
  <button onclick="start(1)">中1</button>
  <button onclick="start(2)">中2</button>
  <button onclick="start(3)">中3</button>
</div>

<div id="game">
  <div class="progressText" id="progressText"></div>
  <div class="progress">
    <div id="bar"></div>
  </div>
  <div class="question" id="question"></div>
  <div id="choices"></div>
  <div id="result"></div>
  <div id="explain"></div>
  <button id="next" onclick="nextQuestion()">次の問題 ▶</button>
</div>

<div id="final-result">
  <h2>🎉 結果発表 🎉</h2>
  <div class="result-stats" id="final-score">正解数: 0 / 0問</div>
  <div class="result-rate" id="final-rate">正答率: 0%</div>
  <div class="result-point" id="final-earned-points">獲得ポイント: +0P</div>
  <button onclick="location.reload()">もう一回やる</button>
  <button onclick="location.href='index.html'" style="background: #757575;">ホームへ戻る</button>
</div>

</main>

<script>
const pointText = document.getElementById("point");
let point = Number(localStorage.getItem("point")) || 0;
pointText.textContent = point;

let current = 0;
let answered = false;
let questions = [];
let correctCount = 0; 

// --- 社会科クイズデータベース（重複を解消・エラー修正完了） ---
const db = {
  1:[
    // --- 地理：地球の姿・領土・時差（15問） ---
    {q:"主権の及ぶ範囲のうち、「領空」とはどこの上空か？",c:["領土の上空のみ","領海の上空のみ","領土と領海の上空","領土と接続水域の上空"],a:2,ex:"領空は領土（陸）と領海（海）を合わせた領海基線より内側の上空です。"},
    {q:"領海の外側にあり、密輸の取り騙りなどのために主権の一部を及ぼすことができる、領土から24海里以内の水域は？",c:"排他的経済水域,接続水域,公海,領空".split(","),a:1,ex:"領海（12海里）の外側さらに12海里の範囲を接続水域といいます。"},
    {q:"日本の国土面積はおよそ何平方キロメートルか？",c:"およそ18万,およそ28万,およそ38万,およそ48万".split(","),a:2,ex:"日本の面積は約38万平方キロメートルです。"},
    {q:"日本の位置を大陸との関係で説明するとき、ふさわしい表現を選べ。",c:["アフリカ大陸の西にある国","ユーラシア大陸の東にある国","北アメリカ大陸の南にある国","オーストラリア大陸の北にある国"],a:1,ex:"日本は世界最大の陸地であるユーラシア大陸の東の端に位置する島国です。"},
    {q:"日本の最南端の島であり、周囲の排他的経済水域（EEZ）を失わないためにコンクリートで護岸工事が行われた島は？",c:"択捉島,竹島,魚釣島,沖ノ鳥島".split(","),a:3,ex:"満潮時に海に沈んで島でなくなるとEEZが消滅するため、国費を投じて周囲を護岸しています。"},
    {q:"標準時子午線（東経135度）が通る兵庫県明石市よりも、「早く日付が変わる（時間が進んでいる）」国はどこか？",c:["ロンドン（経度0度）","カイロ（東経30度）","ニューヨーク（西経75度）","ニュージーランド（東経170度付近）"],a:3,ex:"地球は東から西へ自転しているため、東経の数字が大きい（東にある）場所ほど早く朝が来ます。"},
    {q:"東京（東経135度）とカイロ（東経30度）の時差は何時間か？",c:"5時間,7時間,9時間,11時間".split(","),a:1,ex:"経度の差は 135 - 30 = 105度。 105 ÷ 15 = 7時間 となります。"},
    {q:"東京（東経135度）が6月17日午前10時のとき、東経45度にあるバグダッドは何月何日何時か？",c:["6月17日午前4時","6月17日午後4時","6月16日午前4時","6月16日午後4時"],a:0,ex:"経度の差は 135 - 45 = 90度。時差は 90 ÷ 15 = 6時間。東京の方が東にあるのでバグダッドは6時間遅らせて午前4時です。"},
    {q:"ロサンゼルス（西経120度）が1月1日午前3時のとき、本初子午線が通るロンドン（経度0度）は何時か？",c:["1月1日午前11時","1月1日午後11時","12月31日午後7時","1月1日午後3時"],a:0,ex:"時差は 120 ÷ 15 = 8時間。ロンドンの方が東（進んでいる）なので、午前3時に8時間を足して午前11時です。"},
    {q:"成田（東経135度）を6月17日午前7時に出発し、14時間飛行して西経75度のニューヨークに到着した。現地時間は？",c:["6月17日午前7時","6月17日午前11時","6月17日午後9時","6月18日午前11時"],a:0,ex:"東京とNYの時差は (135+75)÷15 = 14時間。14時間進んで14時間戻るため、到着現地時間は出発時と同じ午前7時です。"},
    {q:"リオデジャネイロ（西経45度）の現地時間「3月2日午後8時」に電話をつなぐには、日本（東経135度）からはいつかければよいか？",c:["3月1日午前8時","3月1日午後2時","3月3日午前8時","3月3日午後8時"],a:2,ex:"時差は (135+45)÷15 = 12時間。日本の方が12時間進んでいるので、3月2日午後8時に12時間を足すと3月3日午前8時になります。"},
    {q:"地球を赤道を基準に2つに分けたとき、北側の部分を何というか？",c:["北半球","南半球","東半球","西半球"],a:0,ex:"赤道より北側を北半球、南側を南半球といいます。"},
    {q:"イギリスの旧グリニッジ天文台を通る、経度が0度の基準となる線を何というか？",c:["本初子午線","赤道","日付変更線","標準時子午線"],a:0,ex:"経度0度の線を本初子午線といいます。"},
    {q:"ほぼ経度180度の位置にあり、太平洋上に設定されている日付を調整するための線を何というか？",c:["日付変更線","本初子午線","赤道","北回帰線"],a:0,ex:"日付変更線を東から西に越えるときは日付を1日進め、西から東に越えるときは1日戻します。"},
    {q:"世界で最も面積が大きい国と、最も面積が小さい国の組み合わせとして正しいものは？",c:["ロシア・バチカン市国","カナダ・モナコ","アメリカ・サンマリノ","中国・モルディブ"],a:0,ex:"世界最大の国はロシア、最小の国はバチカン市国です。"},

    // --- 地理：世界の気候と暮らし（15問） ---
    {q:"赤道付近に見られる、一年中気温が高く、毎日激しい雨（スコール）が降る気候帯は何か？",c:"熱帯,乾燥帯,温帯,冷帯".split(","),a:0,ex:"熱帯には熱帯雨林気候やサバナ気候があります。"},
    {q:"降水量が非常に少なく、樹木が育たないため、砂漠やステップが広がる気候帯は何か？",c:"乾燥帯,熱帯,温帯,寒帯".split(","),a:0,ex:"乾燥帯ではオアシスを中心に農業が行われます。"},
    {q:"四季の変化がはっきりしており、温暖で人間が暮らしやすく、日本の大部分が属する気候帯は何か？",c:"温帯,熱帯,冷帯,寒帯".split(","),a:0,ex:"温帯には温暖湿潤気候や地中海性気候などがあります。"},
    {q:"北半球の北部に広がり、冬の寒さが厳しく、タイガと呼ばれる針葉樹林が広がる気候帯は何か？",c:"冷帯（亜寒帯）,寒帯,温帯,高山気候".split(","),a:0,ex:"冷帯は寒暖の差が大きく、シベリアやカナダなどが属します。"},
    {q:"一年中寒さが非常に厳しく、農業を行うことができない、北極や南極周辺の気候帯は何か？",c:"寒帯,冷帯,乾燥帯,高山気候".split(","),a:0,ex:"寒帯には、夏だけ苔類が生えるツンドラ気候と、氷に覆われた氷雪気候があります。"},
    {q:"標高が高い地域で見られる、同緯度の平地よりも気温が低くなる気候を何というか？",c:"高山気候,寒帯気候,ステップ気候,地中海性気候".split(","),a:0,ex:"アンデス山脈などでは、高山気候を活かしてジャガイモなどが栽培されます。"},
    {q:"熱帯のアマゾン川流域などで見られる、一年中緑の葉が生い茂る密林を何というか？",c:"熱帯雨林,タイガ,サバナ,ステップ".split(","),a:0,ex:"東南アジアではジャングル、南アメリカではセルバと呼ばれる熱帯雨林が広がります。"},
    {q:"乾燥帯の砂漠の中で、湧き水などによって植物が生え、人間が生活できる場所を何というか？",c:"オアシス,ワジ,ステップ,ゲル".split(","),a:0,ex:"オアシスではナツメヤシの栽培や、泥レンガの家での生活が見られます。"},
    {q:"モンゴルなどの乾燥帯の草原で、遊牧民が移動しながら暮らすために使う組み立て式のテントを何というか？",c:"ゲル,パオ,イグルー,高床倉庫".split(","),a:0,ex:"モンゴルではゲル、中国ではパオと呼ばれる移動式住居です。"},
    {q:"地中海沿岸で見られる、夏に乾燥し冬に雨が降る、オリーブやブドウの栽培に適した気候は何か？",c:"地中海性気候,西岸海洋性気候,温暖湿潤気候,サバナ気候".split(","),a:0,ex:"温帯のうち、夏の乾燥が強いのが地中海性気候の特徴です。"},
    {q:"ヨーロッパ北西部に見られる、暖流と偏西風の影響で、高緯度の割に冬も温暖で一年中雨が平均して降る気候は何か？",c:"西岸海洋性気候,地中海性気候,温暖湿潤気候,冷帯湿潤気候".split(","),a:0,ex:"北大西洋海流（暖流）と偏西風のおかげで、ロンドンやパリは北海道より高緯度ですが温暖です。"},
    {q:"北極海沿岸の寒帯に住み、アザラシなどの狩猟を中心とした伝統的な暮らしをしてきた先住民族を何というか？",c:"イヌイット,アボリジニ,マオリ,インディアン".split(","),a:0,ex:"イヌイットはかつてイグルーという氷の家に住んでいました。"},
    {q:"東南アジアや南アジアなどの温帯・熱帯地域で、夏の農業に大きな影響を与える、季節によって風向きが変わる風は何か？",c:"季節風（モンスーン）,偏西風,貿易風,エルニーニョ".split(","),a:0,ex:"季節風は夏は海から陸へ湿った空気を運び、大量の雨をもたらします。"},
    {q:"アンデス山脈などの高地で、寒さに強い特徴を活かして家畜として飼育されている動物の組み合わせは？",c:["ラマ・アルパカ","トナカイ・ヤク","ラクダ・馬","羊・牛"],a:0,ex:"高山気候のアンデスでは、毛織物の原料となるラマやアルパカが飼われます。"},
    {q:"アフリカ大陸の北部に広がる、世界最大の砂漠の名前は何か？",c:"サハラ砂漠,ゴビ砂漠,カラハリ砂漠,ギブソン砂漠".split(","),a:0,ex:"サハラ砂漠はオーストラリア大陸とほぼ同じ面積を持つ巨大な砂漠です。"},

    // --- 歴史：世界の古代文明・都市国家（15問） ---
    {q:"エジプト文明において、天体観測やナイル川のはんらん時期を知るために作られた暦は何か？",c:"太陽暦,太陰暦,太陰太陽暦,マヤ暦".split(","),a:0,ex:"エジプトでは太陽暦、メソポタミアでは太陰暦が作られました。"},
    {q:"メソポタミア文明において、「目には目を、歯には歯を」の復讐法の原則で知られる法典は何か？",c:"ハムラビ法典,十二表法,大宝律令,ローマ法大全".split(","),a:0,ex:"バビロニアのハムラビ王が発布したハムラビ法典です。"},
    {q:"インダス文明の都市遺跡モヘンジョ・ダロなどで、建物の主な材料として使われたものは何か？",c:"焼成レンガ,大理石,コンクリート,木材".split(","),a:0,ex:"インダス文明では、大きさが統一された焼きレンガが大量に使われました。"},
    {q:"中国の殷の時代、青銅器のほかに、亀の甲羅や動物の骨に刻まれて占いに使われた文字は何か？",c:"甲骨文字,くさび形文字,神聖文字,絵文字".split(","),a:0,ex:"甲骨文字は現在の漢字の原型となりました。"},
    {q:"中国の春秋・戦国時代に、孔子が開き、道徳や礼儀を重んじる政治を説いた学問は何か？",c:"儒学（儒教）,道教,仏教,法家".split(","),a:0,ex:"孔子の教えはのちに『論語』としてまとめられ、日本にも大きな影響を与えました。"},
    {q:"紀元前221年、中国を初めて統一し、度量衡（単位）や文字を統一した秦の君主は誰か？",c:"始皇帝,武帝,高祖,項羽".split(","),a:0,ex:"秦の始皇帝は万里の長城を修築したことでも有名です。"},
    {q:"漢（前漢）の武帝の時代に整備され、中国の絹などが西方に運ばれた東西交易路の通称は何か？",c:"シルクロード（絹の道）,海の道,ステップの道,琥珀の道".split(","),a:0,ex:"シルクロードを通じて、西方からぶどうや馬、さらに仏教が中国へ伝わりました。"},
    {q:"古代ギリシャに多数成立した、アテネやスパルタに代表される都市国家を何というか？",c:"ポリス,帝国,首長国,直轄領".split(","),a:0,ex:"ポリスの中心にはアクロポリス（丘）やアゴラ（広場）がありました。"},
    {q:"古代ギリシャのアテネで、奴隷や女性を除く成人男性市民による話し合いで方針を決めた政治体制は何か？",c:"民主政,共和政,王政,貴族政".split(","),a:0,ex:"アテネは市民平等の原理に基づく直接民主政を発達させました。"},
    {q:"マケドニアの王で、ペルシャを滅ぼしインダス川流域まで遠征して大帝国を築いた人物は誰か？",c:"アレクサンドロス大王,シーザー,ハンニバル,ネロ大帝".split(","),a:0,ex:"アレクサンドロス大王の遠征がヘレニズム文化を生むきっかけとなりました。"},
    {q:"古代ギリシャの文化とオリエント（東方）の文化が結びついて生まれた文化を何というか？",c:"ヘレニズム文化,ローマ文化,ルネサンス文化,バロック文化".split(","),a:0,ex:"ヘレニズム文化の美意識は、インドのガンダーラ仏像美術にも影響を与えました。"},
    {q:"古代ローマで、紀元前6世紀に王政を廃止したあと、貴族の貴族院（元老院）を中心に行われた政治体制は何か？",c:"共和政,帝政,民主政,専制政".split(","),a:0,ex:"ローマは最初は共和政でしたが、のちにオクタヴィアヌスが初代皇帝となり「帝政」へ移行します。"},
    {q:"古代ローマでつくられた、剣闘士の試合や格闘技が行われた、コンクリート技術を用いた円形闘技場を何というか？",c:"コロッセオ,パルテノン,ジッグラト,凱旋門".split(","),a:0,ex:"コロッセオは5万人以上の観客を収容できたと言われています。"},
    {q:"ローマ帝国が4世紀末に分裂したあと、15世紀まで続き、首都コンスタンティノーブルを中心に栄えた帝国は何か？",c:"東ローマ帝国（ビザンツ帝国）,西ローマ帝国,神聖ローマ帝国,オスマン帝国".split(","),a:0,ex:"西ローマ帝国はすぐに滅びましたが、東ローマ帝国は長く存続しました。"},
    {q:"東ローマ帝国のユスティニアヌス帝が、それまでの膨大なローマ法を整理させて完成させた法典は何か？",c:"ローマ法大全,ハムラビ法典,十二表法,ナポレオン法典".split(","),a:0,ex:"ローマ法大全は、後世のヨーロッパの法律の基礎となりました。"},

    // --- 歴史：三大宗教・ヨーロッパ中世（15問） ---
    {q:"インドでシャカ（釈迦）が開いた、生老病死の苦しみを乗り越えるための正しい心の持ち方を説いた宗教は何か？",c:"仏教,ヒンドゥー教,ジャイナ教,キリスト教".split(","),a:0,ex:"仏教はのちに東南アジアへ広まる南伝仏教と、中国・日本へ伝わる北伝仏教に分かれます。"},
    {q:"パレスチナ地方でイエスが起こし、神の絶対の愛と隣人愛を説いたが、のちにローマ帝国の国教となった宗教は何か？",c:"キリスト教,ユダヤ教,イスラム教,ゾロアスター教".split(","),a:0,ex:"キリスト教は最初迫害されましたが、4世紀末にローマ帝国の国教となりました。"},
    {q:"7世紀初めにムハンマドがアラビア半島のメッカで開き、唯一神アッラーへの絶対服従を説いた宗教は何か？",c:"イスラム教,キリスト教,ヒンドゥー教,ユダヤ教".split(","),a:0,ex:"イスラム教の聖典は『コーラン（クルアーン）』です。"},
    {q:"仏教、キリスト教、イスラム教のように、民族や地域の枠を超えて世界中で広く信仰されている宗教を何というか？",c:"世界宗教,民族宗教,自然宗教,新興宗教".split(","),a:0,ex:"世界宗教に対し、特定の民族の間で信仰されるものを民族宗教（ユダヤ教など）といいます。"},
    {q:"中世の西ヨーロッパにおいて、キリスト教の教会の頂点に立ち、国王をもしのぐ絶大な権力を持った聖職者を何というか？",c:"ローマ教皇（法王）,大司教,総主教,牧師".split(","),a:0,ex:"ローマ教皇はバチカンを拠点に、中世ヨーロッパの精神社会を支配しました。"},
    {q:"中世ヨーロッパで、国王や領主が家臣に土地（領地）を与える代わりに軍役の義務を負わせた、主従関係に基づく社会仕組みは何か？",c:"封建制度,律令制度,奴隷制度,藩政制度".split(","),a:0,ex:"土地を媒介としたこの主従関係を封建制度といいます。"},
    {q:"11世紀末から、聖地エルサレムをイスラム勢力から奪還するために、ローマ教皇の呼びかけで派遣された遠征軍を何というか？",c:"十字軍,騎士団,元軍,無敵艦隊".split(","),a:0,ex:"十字軍の遠征は軍事的には失敗しましたが、東西の商業や文化の交流を盛んにしました。"},
    {q:"13世紀にチンギス・ハンがユーラシア大陸の広大な遊牧民族を統一して築いた、史上最大の帝国は何か？",c:"モンゴル帝国,ペルシャ帝国,ローマ帝国,オスマン帝国".split(","),a:0,ex:"モンゴル帝国は、強力な騎馬隊と駅伝制（ジャムチ）で大帝国を維持しました。"},
    {q:"モンゴル帝国の5代皇帝フビライ・ハンが、都を大都（北京）に移して定めた中国風の国号は何か？",c:"元,宋,明,清".split(","),a:0,ex:"元は高麗を服属させ、日本にも2度にわたって大軍を送りました（元寇）。"},
    {q:"元の宮廷に約17年間仕え、帰国後に日本のことを「黄金の国ジパング」とヨーロッパに紹介したイタリアの商人は誰か？",c:"マルコ・ポーロ,マゼラン,コロンブス,ルイス・フロイス".split(","),a:0,ex:"マルコ・ポーロの旅行記は『東方見聞録（世界の記述）』としてまとめられました。"},
    {q:"イスラム教徒が毎日その方向に向かって礼拝を行う、サウジアラビアにある最大の聖地はどこの都市か？",c:"メッカ,メディナ,エルサレム,カイロ".split(","),a:0,ex:"メッカにあるカアバ神殿に向かって、世界中の教徒が礼拝を行います。"},
    {q:"キリスト教、ユダヤ教、イスラム教の3つの宗教共通の聖地となっている、パレスチナ地方の都市はどこか？",c:"エルサレム,メッカ,バビロン,ナザレ".split(","),a:0,ex:"エルサレムは歴史的経緯から、3大宗教の聖地が狭い区域に密集しています。"},
    {q:"5世紀に西ローマ帝国が滅亡したあと、ゲルマン人が現在のフランス周辺に建てて発展させた王国は何か？",c:"フランク王国,ビザンツ王国,アングロサクソン王国,東ゴート王国".split(","),a:0,ex:"フランク王国はキリスト教を受け入れ、西ヨーロッパの中心勢力となりました。"},
    {q:"中世ヨーロッパの領主の領地において、城の周囲に広がり、城下で小作農（農奴）が働いていた農業集落を何というか？",c:"荘園,ポリス,コロニア,コッヘム".split(","),a:0,ex:"自給足の経済単位であった領主の領地を荘園（しょうえん）といいます。"},
    {q:"14世紀のヨーロッパで大流行し、全人口の約3分の1を死に至らしめ、社会構造を一変させた感染症は何か？",c:"ペスト（黒死病）,コレラ,スペイン風邪,天然痘".split(","),a:0,ex:"ペストの大流行により労働力が激減し、封建制度や荘園崩壊が加速しました。"},

    // --- 歴史：日本の始まり・旧石器〜弥生（15問） ---
    {q:"日本の氷河時代（旧石器時代）にあたる、長野県の野尻湖などの遺跡から発見された、石を打ち欠いて作った石器を何というか？",c:"打製石器,磨製石器,骨角器,青銅器".split(","),a:0,ex:"旧石器時代の人々は、ナウマンゾウなどの大型動物を追って移動生活をしていました。"},
    {q:"紀元57年、倭の奴国の王が中国の漢（後漢）の光武帝から授かり、福岡県の志賀島で出土したとされるものは何か？",c:"金印,銅鐸,銅鏡,鉄剣".split(","),a:0,ex:"金印には「漢委奴国王」の5文字が刻まれています。"},
    {q:"紀元239年、中国の魏に使いを送り、「親魏倭王」の称号と多数の銅鏡を授かった邪馬台国の女王は誰か？",c:"卑弥呼,推古天皇,持統天皇,神功皇后".split(","),a:0,ex:"卑弥呼は「鬼道」と呼ばれるまじないで国を治めていたと歴史書に記されています。"},
    {q:"邪馬台国があった場所をめぐって、近畿地方（奈良県など）とする説と、どこ地方とする説で今も論争が続いているか？",c:"九州地方,関東地方,東北地方,中国地方".split(","),a:0,ex:"現在は近畿説（纒向遺跡など）と九州説で激しく議論されています。"},
    {q:"日本列島において、縄文時代の終わりから弥生時代にかけて、大陸から九州北部に伝わり本格化した農業技術は何か？",c:"水田稲作,畑作,麦作,焼畑農業".split(","),a:0,ex:"米作りが始まったことで、富の蓄えや土地をめぐる争い（戦争）が発生しました。"},
    {q:"約1万3000年前から始まり、表面に縄目の文様がある、厚手で黒褐色の土器が使われていた時代を何というか？",c:"縄文時代,旧石器時代,弥生時代,古墳時代".split(","),a:0,ex:"縄文時代には、定住生活が始まり竪穴住居が作られました。"},
    {q:"縄文時代の人々が、食べたあとの貝殻や魚の骨、壊れた道具などを捨ててできた、当時のゴミ捨て場のような遺跡を何というか？",c:"貝塚,高床倉庫,古墳,環濠集落".split(","),a:0,ex:"モースが発見した大森貝塚などが有名で、当時の食生活を知る手がかりになります。"},
    {q:"縄文時代に作られた、女性をかたどったものが多く、魔よけや豊かな収穫・子孫繁栄を祈るために使われた土の人形を何というか？",c:"土偶,埴輪,須恵器,木偶".split(","),a:0,ex:"土偶は縄文時代、埴輪は古墳時代の墓（古墳）のまわりに並べられたものです。"},
    {q:"弥生時代に作られた、集落の周囲に深い溝（ほり）や土塁を巡らせて、外敵の侵入を防いだ集落を何というか？",c:"環濠集落,高地性集落,条里集落,門前町".split(","),a:0,ex:"佐賀県の吉野ヶ里遺跡が代表的な環濠集落です。"},
    {q:"弥生時代、収穫した米をネズミや湿気から守るために、床を地面から高くして建てられた倉庫を何というか？",c:"高床倉庫,竪穴住居,石室,アゴラ".split(","),a:0,ex:"柱の上の部分に「ネズミ返し」と呼ばれる板が取り付けられていました。"},
    {q:"弥生時代に使われた、薄手で赤褐色、縄文土器よりも硬くて実用的な土器を何というか？",c:"弥生土器,須恵器,土師器,黒曜石".split(","),a:0,ex:"東京都の向ヶ岡貝塚（弥生町）で発見されたことから弥生土器と名付けられました。"},
    {q:"弥生時代に大陸から伝わった金属器のうち、主に祭りの道具（祭器）として使われた、平べったい鐘のような青銅器は何か？",c:"銅鐸,鉄剣,銅鏡,鉄斧".split(","),a:0,ex:"銅鐸（どうたく）や銅鏡は主に祭祀の道具として、鉄器は武器や工具として使われました。"},
    {q:"中国の歴史書『魏志倭人伝』が収められている、三国時代の歴史を記した書物の名前は何か？",c:"三国志,漢書,後漢書,史記".split(","),a:0,ex:"『三国志』の中の「魏書」東夷伝倭人の条（通称・魏志倭人伝）です。"},
    {q:"青森県で発見された、縄文時代中期の大規模な集落遺跡で、巨大な栗の木の柱の跡などが残る遺跡は何か？",c:"三内丸山遺跡,登呂遺跡,吉野ヶ里遺跡,岩宿遺跡".split(","),a:0,ex:"三内丸山遺跡の発見により、縄文時代に高度な定住社会があったことが証明されました。"},
    {q:"群馬県で相沢忠洋が「打製石器」を発見したことから、日本にも旧石器時代があったことが証明された遺跡はどこか？",c:"岩宿遺跡,三内丸山遺跡,板付遺跡,菜畑遺跡".split(","),a:0,ex:"岩宿遺跡の関東ローム層から赤土の中から打製石器が発見されました。"},

    // --- 歴史：古墳時代〜大和政権（10問） ---
    {q:"5世紀の朝鮮半島において、日本（倭）と交流が深かったものの、5世紀後半に北の高句麗などに圧迫された国はどこか？",c:"百済,新羅,加羅,唐".split(","),a:0,ex:"日本は大和政権の時代、百済（くだら）と同盟関係にあり、多くの技術を受け入れました。"},
    {q:"5世紀の倭の五王のうち、中国の歴史書に「武」として記録され、埼玉の稲荷山古墳の鉄剣にも名がある大王は誰か？",c:["ワカタケル大王（雄略天皇）","聖徳太子","中大兄皇子","天武天皇"],a:0,ex:"「武」＝ワカタケル大王であり、その勢力は九州から関東まで及んでいたことが鉄剣の銘文から分かっています。"},
    {q:"大阪府堺市にある、全長486mにおよぶ世界最大級の、鍵穴のような形をした「前方後円墳」の名前は何か？",c:"大仙古墳（伝仁徳天皇陵）,江田船山古墳,稲荷山古墳,箸墓古墳".split(","),a:0,ex:"日本で最大の面積を誇る古墳が大仙古墳です。"},
    {q:"前方後円墳の構造において、王の遺体や副葬品を納めた「石室」や「棺」は、古墳のどの部分に配置されていたか？",c:["後ろの丸い部分（後円部）","前の四角い部分（前方部）","古墳のまわりの濠（ほり）の中","最下部の地下深く"],a:0,ex:"前方後円墳の主たる埋葬施設は、後ろの一番高く丸い部分である「後円部」に作られます。"},
    {q:"古墳の斜面や頂上に並べられた、素焼きの土製品で、人物や家、馬、円筒の形をしたものを何というか？",c:"埴輪,土偶,須恵器,土師器".split(","),a:0,ex:"埴輪（はにわ）は、お墓の境界線や、王の権力を示すために並べられました。"},
    {q:"4世紀から6世紀にかけて、朝鮮半島や大陸から一族で日本に移住し、新しい技術や文化を伝えた人々を何というか？",c:"渡来人,防人,検非違使,御家人".split(","),a:0,ex:"漢字、仏教、儒教、新技術などはすべて渡来人によってもたらされました。"},
    {q:"渡来人が日本に伝えた技術や文化のうち、それまでの弥生土器とは異なり、穴窯を使って高温で焼かれた灰色で頑丈な土器は？",c:"須恵器,土師器,縄文土器,青磁".split(","),a:0,ex:"朝鮮半島から伝わった、現在の陶器に近い灰色の硬い土器を須恵器といいます。"},
    {q:"3世紀後半から4世紀にかけて、近畿地方の大和を中心とする有力な豪族たちが連合して作った政治組織を何というか？",c:"大和政権（大和朝廷）,邪馬台国,奴国,幕府".split(","),a:0,ex:"大和政権の最高権力者は、のちに「大王（おおきみ）」と呼ばれるようになりました。"},
    {q:"古墳時代の中期（5世紀）に多く作られた、巨大な前方後円墳のまわりに掘られた、水をたたえた溝を何というか？",c:"濠（ほり・周濠）,土塁,環濠,落とし穴".split(","),a:0,ex:"濠（しゅうごう）を巡らせることで、聖なる墓の区域を一般から区別しました。"},
    {q:"古墳時代に大陸から伝わった、大和政権が記録や外交文書を作成するために使い始めた文字は何か？",c:"漢字,カタカナ,ひらがな,アルファベット".split(","),a:0,ex:"漢字を使って、日本の王の名前や出来事が鉄剣などに刻まれるようになりました。"},

    {q:"603年、聖徳太子が定めた、家柄によらず能力や功績のある人を役人に登用する制度は何か？",c:"冠位十二階,十七条の憲法,大化の改新,班田収授法".split(","),a:0,ex:"冠位十二階は、冠の色によって地位を明確に分けました。"},
    {q:"604年、聖徳太子が役人たちに対して「和を以て貴しと為す」などの心得を示したきまりは何か？",c:"十七条の憲法,大宝律令,御成敗式目,武家諸法度".split(","),a:0,ex:"仏教や儒教の考え方を取り入れた、役人の道徳的な心得です。"},
    {q:"聖徳太子が中国（隋）の進んだ制度や文化を取り入れるために小野妹子らを派遣した使節を何というか？",c:"遣隋使,遣唐使,遣明使,通信使".split(","),a:0,ex:"「日出づる処の天子、書を日没する処の天子に致す」という対等な国交を求めました。"},
    {q:"645年、中大兄皇子と中臣鎌足らが蘇我氏を倒して始めた、中央集権国家を目指した政治改革は何か？",c:"大化の改新,壬申の乱,承久の乱,保元の乱".split(","),a:0,ex:"中大兄皇子はのちに天智天皇となり、戸籍の作成などを進めました。"},
    {q:"大化の改新の基本方針で、それまで豪族が私有していた土地と人民を、すべて国家（天皇）のものとした原則を何というか？",c:"公地公民,班田収授,墾田永年私財,天下布武".split(","),a:0,ex:"すべての土地と人を国のものとしました。"},
    {q:"天智天皇の死後、跡継ぎをめぐって大海人皇子と大友皇子が争い、大海人皇子が勝利して天武天皇となった大乱は何か？",c:"壬申の乱,承久の乱,応仁の乱,平治の乱".split(","),a:0,ex:"672年に起きた古代最大の内乱が壬申の乱（じんしんのらん）です。"},
    {q:"701年、唐の法律（律・令）にならって作られた、日本最初の本格的な律令体系を何というか？",c:"大宝律令,養老律令,近江令,飛鳥浄御原令".split(","),a:0,ex:"刑法の「律」と、行政法の「令」が揃った国家の基本法です。"},
    {q:"710年、唐の都（長安）にならって、現在の奈良市に作られた、碁盤の目のように区画された美しい都は何か？",c:"平城京,平安京,藤原京,長岡京".split(","),a:0,ex:"「なんと（710）綺麗な平城京」として奈良時代が始まりました。"},
    {q:"奈良時代、6歳以上の男女に国から「口分田」を与え、死ぬと国に返させた、律令制度の仕組みを何というか？",c:"班田収授法,墾田永年私財法,地租改正法,太閤検地".split(","),a:0,ex:"戸籍に基づいて土地を配り、その代わりに税を徴収しました。"},

};

function start(g) {
  current = 0;
  correctCount = 0; 
  answered = false;

  const selectedCount = Number(document.getElementById("q-count").value);

  let allQuestions = [...db[g]];
  allQuestions.sort(() => Math.random() - 0.5);

  questions = allQuestions.slice(0, Math.min(selectedCount, allQuestions.length));

  document.getElementById("menu").style.display = "none";
  document.getElementById("game").style.display = "block";

  showQuestion();
}

function showQuestion() {
  answered = false;
  let q = questions[current];

  document.getElementById("progressText").innerHTML = "問題 " + (current + 1) + " / " + questions.length;
  document.getElementById("bar").style.width = ((current + 1) / questions.length * 100) + "%";
  document.getElementById("question").innerHTML = q.q;

  let html = "";
  q.c.forEach((choice, index) => {
    html += `<button class="choice" onclick="answer(${index})">${choice}</button>`;
  });

  document.getElementById("choices").innerHTML = html;
  document.getElementById("result").innerHTML = "";
  document.getElementById("explain").innerHTML = "";
  document.getElementById("next").style.display = "none";
}

function answer(select) {
  if (answered) return;
  answered = true;

  const q = questions[current];
  const buttons = document.querySelectorAll(".choice");

  buttons.forEach((btn, index) => {
    btn.disabled = true;
    if (index === q.a) {
      btn.classList.add("correct");
    }
    if (index === select && select !== q.a) {
      btn.classList.add("wrong");
    }
  });

  localStorage.setItem("socialAnswered", (Number(localStorage.getItem("socialAnswered")) || 0) + 1);

  if (select === q.a) {
    document.getElementById("result").innerHTML = "⭕ 正解！ +2P";
    
    correctCount++;
    point += 2;
    localStorage.setItem("point", point);
    pointText.textContent = point;
    localStorage.setItem("socialCorrect", (Number(localStorage.getItem("socialCorrect")) || 0) + 1);
  } else {
    document.getElementById("result").innerHTML = "❌ 不正解";
  }

  document.getElementById("explain").innerHTML = "<b>解説</b><br>" + q.ex;
  document.getElementById("next").style.display = "block";
}

function nextQuestion() {
  current++;

  if (current >= questions.length) {
    showFinalResult();
    return;
  }

  showQuestion();
}

function showFinalResult() {
  document.getElementById("game").style.display = "none";
  document.getElementById("final-result").style.display = "block";

  const rate = Math.round((correctCount / questions.length) * 100);
  const earnedPoints = correctCount * 2;

  document.getElementById("final-score").innerHTML = `正解数: ${correctCount} / ${questions.length}問`;
  document.getElementById("final-rate").innerHTML = `正答率: ${rate}%`;
  document.getElementById("final-earned-points").innerHTML = `獲得ポイント: +${earnedPoints}P`;
}
</script>
