<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社会 | 一問一答マスター</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Yu Gothic",sans-serif;}
body{background:#eef3f8;}
header{
  height:60px;
  background:#66bb6a; /* 社会のテーマカラー：グリーン */
  color:#fff;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
}
header a{
  color:white;
  text-decoration:none;
  font-weight:bold;
}
.point{
  background:white;
  color:#66bb6a;
  padding:8px 15px;
  border-radius:10px;
  font-weight:bold;
}
main{
  max-width:900px;
  margin:25px auto;
  padding:20px;
}
h1{
  text-align:center;
  margin-bottom:20px;
}

.menu{
  text-align:center;
}

.settings {
  margin-bottom: 20px;
  background: white;
  padding: 15px;
  border-radius: 10px;
  display: inline-block;
}
.settings select {
  padding: 5px 10px;
  font-size: 16px;
  border-radius: 5px;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#66bb6a;
  color:white;
  margin:6px;
  font-size:17px;
}

button:hover{
  background:#43a047;
}

#game, #final-result {
  display:none;
}

.progressText{
  font-weight:bold;
  margin-bottom:8px;
}

.progress{
  width:100%;
  height:18px;
  background:#cfd8dc;
  border-radius:20px;
  overflow:hidden;
  margin-bottom:20px;
}

#bar{
  width:0%;
  height:100%;
  background:#43a047;
  transition:.3s;
}

.question{
  font-size:25px;
  font-weight:bold;
  margin:20px 0;
}

.choice{
  display:block;
  width:100%;
  margin:10px 0;
  padding:14px;
  background:white;
  color:#222;
  border:2px solid #66bb6a;
  border-radius:10px;
  cursor:pointer;
  text-align:left;
  font-size:18px;
}

.choice:hover{
  background:#e8f5e9;
}

.correct{
  background:#43a047!important;
  color:white;
}

.wrong{
  background:#e53935!important;
  color:white;
}

#result{
  font-size:28px;
  font-weight:bold;
  margin-top:15px;
}

#explain{
  margin-top:15px;
  background:#fff;
  padding:15px;
  border-left:5px solid orange;
}

#next{
  display:none;
  width:100%;
  margin-top:20px;
}

#final-result {
  text-align: center;
  background: white;
  padding: 30px;
  border-radius: 10px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}
.result-stats {
  font-size: 22px;
  margin: 15px 0;
  font-weight: bold;
}
.result-rate {
  font-size: 28px;
  color: #e53935;
  margin: 15px 0;
  font-weight: bold;
}
.result-point {
  font-size: 20px;
  color: #66bb6a;
  margin-bottom: 20px;
}
</style>

</head>
<body>

<header>
  <div>📚 一問一答マスター</div>
  <div>
    <a href="index.html">🏠ホーム</a>
    <span class="point">⭐ <span id="point">0</span>P</span>
  </div>
</header>

<main>

<h1>🌏 社会</h1>

<div class="menu" id="menu">

  <div class="settings">
    <label for="q-count"><b>出題数：</b></label>
    <select id="q-count">
      <option value="1">1問</option>
      <option value="5" selected>5問</option>
      <option value="10">10問</option>
      <option value="20">20問</option>
      <option value="30">30問</option>
      <option value="40">40問</option>
      <option value="50">50問</option>
      <option value="75">75問</option>
      <option value="100">100問</option>
    </select>
  </div>

  <h2>分野・学年を選択してスタート</h2>
  <button onclick="start(1)">中1</button>
  <button onclick="start(2)">中2</button>
  <button onclick="start(3)">中3</button>
</div>

<div id="game">
  <div class="progressText" id="progressText"></div>
  <div class="progress">
    <div id="bar"></div>
  </div>
  <div class="question" id="question"></div>
  <div id="choices"></div>
  <div id="result"></div>
  <div id="explain"></div>
  <button id="next" onclick="nextQuestion()">次の問題 ▶</button>
</div>

<div id="final-result">
  <h2>🎉 結果発表 🎉</h2>
  <div class="result-stats" id="final-score">正解数: 0 / 0問</div>
  <div class="result-rate" id="final-rate">正答率: 0%</div>
  <div class="result-point" id="final-earned-points">獲得ポイント: +0P</div>
  <button onclick="location.reload()">もう一回やる</button>
  <button onclick="location.href='index.html'" style="background: #757575;">ホームへ戻る</button>
</div>

</main>

<script>
const pointText = document.getElementById("point");
let point = Number(localStorage.getItem("point")) || 0;
pointText.textContent = point;

let current = 0;
let answered = false;
let questions = [];
let correctCount = 0; 

// --- 社会科クイズデータベース（構文エラー検証済み） ---
const db = {
  1:[
    { q: "地球を赤道を境に2つに分けたとき、北側の部分を何というか？", c: ["北半球", "南半球", "東半球", "西半球"], a: 0, ex: "赤道より北を北半球、南を南半球と呼びます。日本は北半球にあります。" },
    { q: "緯度が0度の線を「赤道」というが、経度が0度の線を何というか？", c: ["本初子午線", "日付変更線", "回帰線", "標準時子午線"], a: 0, ex: "イギリスの旧グリニッジ天文台を通る経度0度の線を「本初子午線（ほんしょしごせん）」といいます。" },
    { q: "世界で最も面積が大きい国はどこか？", c: ["ロシア", "カナダ", "アメリカ", "中国"], a: 0, ex: "1位はロシア、2位はカナダ、3位はアメリカ（または中国）の順になります。" },
    { q: "周囲を海に囲まれ、領土に陸上の国境がない国を何というか？", c: ["海洋国（島国）", "内陸国", "大西洋国", "半島国"], a: 0, ex: "日本やイギリスのように、領土がすべて島からなる国を島国（海洋国）といいます。" },
    { q: "周囲を他の国の領土に囲まれ、海に面していない国を何というか？", c: ["内陸国", "島国", "領海国", "緩衝国"], a: 0, ex: "モンゴルやスイスのように、海を持たない国を「内陸国」といいます。" },
    { q: "日本の標準時（基準となる時間）を決める東経135度の基準線が通る、兵庫県の都市はどこか？", c: ["明石市", "神戸市", "姫路市", "西宮市"], a: 0, ex: "兵庫県明石市を通る東経135度の経線が、日本の標準時子午線に指定されています。" },
    { q: "縄文時代に使われていた、表面に縄目の文様がある土器を何というか？", c: ["縄文土器", "弥生土器", "土師器", "須恵器"], a: 0, ex: "厚手で黒褐色、縄の模様があるのが特徴の縄文土器です。" },
    { q: "弥生時代に始まった、大陸から伝わった作物の栽培方法を何というか？", c: ["稲作（水田稲作）", "畑作", "新田開発", "輪作"], a: 0, ex: "弥生時代になると大陸から米作り（水田稲作）が伝わり、人々の生活が定住化しました。" },
    { q: "聖徳太子が定めた、家柄にとらわれず能力のある人を役人に登用する制度は何か？", c: ["冠位十二階", "十七条の憲法", "大化の改新", "班田収授法"], a: 0, ex: "603年に制定された、冠の色で位を表す制度が「冠位十二階」です。" },
    { q: "701年に唐の法律にならって作られた、日本最初の本格的な法律を何というか？", c: ["大宝律令", "墾田永年私財法", "御成敗式目", "武家諸法度"], a: 0, ex: "刑法の「律」と行政法の「令」をあわせた「大宝律令」により、律令国家の仕組みが整いました。" }
  ],
  2:[
    { q: "日本の気候で、年中季節風の影響を受け、夏に雨が多く冬に乾燥する気候を何というか？", c: ["太平洋側の気候", "日本海側の気候", "瀬戸内の気候", "中央高地の気候"], a: 0, ex: "太平洋側の気候は、夏は季節風で雨が多く、冬は晴れて乾燥します。" },
    { q: "日本海側の気候の特徴として、冬にどのような自然現象が多く見られるか？", c: ["多くの雪が降る", "梅雨が長い", "台風が直撃する", "乾燥した強い風が吹く"], a: 0, ex: "冬に季節風が湿気を運んでくるため、日本海側では世界有数の豪雪地帯となります。" },
    { q: "1192年に源頼朝が開き、鎌倉に拠点を置いた武家政権を何というか？", c: ["鎌倉幕府", "室町幕府", "江戸幕府", "平氏政権"], a: 0, ex: "源頼朝が征夷大将軍に任じられて本格的に始まった武士の政権です。" },
    { q: "室町時代に始まった、守護大名が実力をつけ、下の者が上の者を倒す風潮を何というか？", c: ["下剋上（げこくじょう）", "問屋制家内工業", "大政奉還", "武家諸法度"], a: 0, ex: "実力のある者が上の身分の者に打ち勝つ風潮を「下剋上」といい、戦国時代の幕開けとなりました。" },
    { q: "織田信長が、甲斐（山梨県）の武田氏の騎馬隊を鉄砲を大量に使って破った戦いは何か？", c: ["長篠の戦い", "桶狭間の戦い", "関ヶ原の戦い", "本能寺の変"], a: 0, ex: "1575年、長篠の戦いで信長は新兵器である鉄砲を組織的に使用して勝利しました。" },
    { q: "豊臣秀吉が行った、農民から武器を取り上げて一揆を防ぎ、身分を明確にした政策は何か？", c: ["刀狩（かたながり）", "太閤検地", "身分統制令", "惣無事令"], a: 0, ex: "農民から刀や弓、鉄砲を没収する「刀狩」により、兵農分離が進みました。" },
    { q: "江戸幕府がキリスト教の禁止を徹底し、人々の貿易や海外渡航を厳しく制限した政策を何というか？", c: ["鎖国（さこく）", "参勤交代", "禁中並公家諸法度", "公武合体"], a: 0, ex: "長崎の出島など限定された場所でのみ、オランダや中国と貿易を行う体制（鎖国）を作りました。" },
    { q: "1867年、江戸幕府第15代将軍の徳川慶喜が政権を朝廷に返上した出来事を何というか？", c: ["大政奉還（たいせいほうかん）", "王政復古の大号令", "明治維新", "戊辰戦争"], a: 0, ex: "徳川慶喜が江戸幕府の終わりを告げ、政権を天皇に返した歴史的事件です。" },
    { q: "明治政府が発布した、日本で最初の近代的な最高法規を何というか？", c: ["大日本帝国憲法", "日本国憲法", "五箇条の御誓文", "新律綱領"], a: 0, ex: "1889年に発布された、天皇を主権者とする近代憲法です（通称：明治憲法）。" },
    { q: "1914年にヨーロッパを中心に始まり、日本も参戦した世界規模の大戦争を何というか？", c: ["第一次世界大戦", "第二次世界大戦", "日清戦争", "日露戦争"], a: 0, ex: "同盟国と協商国の間で起こり、新兵器が多数投入された世界初の大戦です。" }
  ],
  3:[
    { q: "日本国憲法の「三つの基本原則」に当てはまらないものはどれか？", c: ["三権分立", "国民主権", "基本的人権の尊重", "平和主義"], a: 0, ex: "憲法の三大原則は「国民主権」「基本的人権の尊重」「平和主義」です。三権分立は政治の仕組みの原則です。" },
    { q: "国の権力を「立法」「行政」「司法」の3つに分け、権力の集中を防ぐ仕組みを何というか？", c: ["三権分立", "地方自治", "議院内閣制", "二院制"], a: 0, ex: "法律を作る国会（立法）、行う内閣（行政）、裁判を行う裁判所（司法）に分ける仕組みです。" },
    { q: "法律を制定する権限を持ち、日本国憲法で「国権の最高機関」と定められている機関はどこか？", c: ["国会", "内閣", "最高裁判所", "地方公共団体"], a: 0, ex: "国会は、国民から選ばれた代表が集まる唯一の立法機関であり、国権の最高機関です。" },
    { q: "国会は「衆議院」と、もう1つの何という議院から成り立っているか？", c: ["参議院", "貴族院", "地方議会", "閣僚会議"], a: 0, ex: "日本の国会は衆議院と参議院の2つからなる「二院制（両院制）」を採用しています。" },
    { q: "内閣の長であり、国会議員の中から国会の指名によって選ばれる役職は何か？", c: ["内閣総理大臣", "国務大臣", "衆議院議長", "最高裁判所長官"], a: 0, ex: "行政のトップであり、大臣を任命する権限を持つのが内閣総理大臣（首相）です。" },
    { q: "憲法に違反する法律や処分がないかどうかを、裁判所が判断する権利を何というか？", c: ["違憲審査権（法令審査権）", "司法権", "弾劾裁判権", "行政不服申立権"], a: 0, ex: "最高裁判所は「憲法の番人」と呼ばれ、法律が憲法に違反していないかを最終決定します。" },
    { q: "日本の裁判制度で、1つの事件について3回まで裁判を受けられる仕組みを何というか？", c: ["三審制", "二審制", "陪審制", "裁判員制度"], a: 0, ex: "慎重に裁判を行い、人権を守り裁判の誤りを防ぐために「三審制」がとられています。" },
    { q: "満20歳以上だった選挙権の年齢を引き下げ、現在は満何歳から投票できるようになったか？", c: ["18歳", "16歳", "19歳", "22歳"], a: 0, ex: "公職選挙法の改正により、現在は「満18歳以上」のすべての日本国民に選挙権があります。" },
    { q: "市場経済において、商品の「需要（買いたい量）」が「供給（売りたい量）」を上回ったとき、価格はどうなるか？", c: ["上がる", "下がる", "変わらない", "ゼロになる"], a: 0, ex: "欲しい人が多くて商品が不足すると、その商品の価格（値段）は上がります。" },
    { q: "第二次世界大戦後に作られた、世界の平和と安全を守るための国際組織を何というか？", c: ["国際連合（国連）", "国際連盟", "世界保健機関", "国際通貨基金"], a: 0, ex: "1945年に設立され、本部はアメリカのニューヨークにある組織が国際連合（UN）です。戦前は国際連盟でした。" }
  ]
};

function start(g) {
  current = 0;
  correctCount = 0; 
  answered = false;

  const selectedCount = Number(document.getElementById("q-count").value);

  let allQuestions = [...db[g]];
  allQuestions.sort(() => Math.random() - 0.5);

  questions = allQuestions.slice(0, Math.min(selectedCount, allQuestions.length));

  document.getElementById("menu").style.display = "none";
  document.getElementById("game").style.display = "block";

  showQuestion();
}

function showQuestion() {
  answered = false;
  let q = questions[current];

  document.getElementById("progressText").innerHTML = "問題 " + (current + 1) + " / " + questions.length;
  document.getElementById("bar").style.width = ((current + 1) / questions.length * 100) + "%";
  document.getElementById("question").innerHTML = q.q;

  let html = "";
  q.c.forEach((choice, index) => {
    html += `<button class="choice" onclick="answer(${index})">${choice}</button>`;
  });

  document.getElementById("choices").innerHTML = html;
  document.getElementById("result").innerHTML = "";
  document.getElementById("explain").innerHTML = "";
  document.getElementById("next").style.display = "none";
}

function answer(select) {
  if (answered) return;
  answered = true;

  const q = questions[current];
  const buttons = document.querySelectorAll(".choice");

  buttons.forEach((btn, index) => {
    btn.disabled = true;
    if (index === q.a) {
      btn.classList.add("correct");
    }
    if (index === select && select !== q.a) {
      btn.classList.add("wrong");
    }
  });

  localStorage.setItem("socialAnswered", (Number(localStorage.getItem("socialAnswered")) || 0) + 1);

  if (select === q.a) {
    document.getElementById("result").innerHTML = "⭕ 正解！ +2P";
    
    correctCount++;
    point += 2;
    localStorage.setItem("point", point);
    pointText.textContent = point;
    localStorage.setItem("socialCorrect", (Number(localStorage.getItem("socialCorrect")) || 0) + 1);
  } else {
    document.getElementById("result").innerHTML = "❌ 不正解";
  }

  document.getElementById("explain").innerHTML = "<b>解説</b><br>" + q.ex;
  document.getElementById("next").style.display = "block";
}

function nextQuestion() {
  current++;

  if (current >= questions.length) {
    showFinalResult();
    return;
  }

  showQuestion();
}

function showFinalResult() {
  document.getElementById("game").style.display = "none";
  document.getElementById("final-result").style.display = "block";

  const rate = Math.round((correctCount / questions.length) * 100);
  const earnedPoints = correctCount * 2;

  document.getElementById("final-score").innerHTML = `正解数: ${correctCount} / ${questions.length}問`;
  document.getElementById("final-rate").innerHTML = `正答率: ${rate}%`;
  document.getElementById("final-earned-points").innerHTML = `獲得ポイント: +${earnedPoints}P`;
}
</script>
</body>
</html>
