<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社会科 一問一答（全80問）</title>
    <style>
        body { margin: 0; padding-top: 70px; font-family: 'Helvetica Neue', Arial, sans-serif; background: #f8fafc; color: #334155; }
        header { position: fixed; top: 0; width: 100%; height: 60px; background: #0f172a; color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 1000; }
        .main-box { margin: 20px auto; max-width: 600px; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .status-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .progress-container { flex-grow: 1; height: 12px; background: #e2e8f0; border-radius: 6px; overflow: hidden; }
        #score-bar { height: 100%; background: #10b981; width: 0%; transition: width 0.3s; }
        .choice-btn { display: block; width: 100%; padding: 18px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 12px; background: white; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        .choice-btn:hover { background: #f1f5f9; }
        .choice-btn.correct { background-color: #d1fae5 !important; border-color: #10b981 !important; color: #065f46; cursor: default; }
        .choice-btn.incorrect { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b; cursor: default; }
        #feedback-area { display: none; margin-top: 20px; padding: 20px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; }
        .exp-box { font-size: 1rem; margin-top: 10px; padding: 15px; background: white; border-radius: 8px; border-left: 4px solid #3b82f6; }
        .btn-home { background: #475569; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    </style>
</head>
<body>
    <header>
        <div>社会科 一問一答</div>
        <button class="btn-home" onclick="location.reload()">ホームに戻る</button>
    </header>
    
    <div id="setup" class="main-box">
        <h3>学年を選択してスタート</h3>
        <button onclick="start('1')" style="width:100%; padding:15px; margin-bottom:10px; background:#1e293b; color:white; border:none; border-radius:8px; cursor:pointer;">中1（地理・古代歴史）</button>
        <button onclick="start('2')" style="width:100%; padding:15px; margin-bottom:10px; background:#334155; color:white; border:none; border-radius:8px; cursor:pointer;">中2（歴史：平安〜近代）</button>
        <button onclick="start('3')" style="width:100%; padding:15px; background:#475569; color:white; border:none; border-radius:8px; cursor:pointer;">中3（現代・公民）</button>
    </div>

    <div id="quiz" class="main-box" style="display:none;">
        <div class="status-bar">
            <span id="progress-text">0 / 0 問</span>
            <div class="progress-container"><div id="score-bar"></div></div>
        </div>
        <div id="q-text" style="font-size:1.3rem; font-weight:bold; margin-bottom:20px;"></div>
        <div id="choices-area"></div>
        <div id="feedback-area">
            <div id="res-text" style="font-size:1.5rem; font-weight:800; text-align:center;"></div>
            <div id="exp-text" class="exp-box"></div>
            <button id="next-btn" onclick="nextQ()" style="width:100%; padding:15px; margin-top:20px; background:#3b82f6; color:white; border:none; border-radius:8px; cursor:pointer;">次へ進む</button>
        </div>
    </div>

    <script>
        const db = {
            '1': [
                {q: "地球の緯度0度の線を何というか？", choices: ["赤道", "本初子午線", "北回帰線", "南極圏"], correct: "赤道", exp: "緯度の基準となる線です。"},
                {q: "イギリスのグリニッジを通る経度0度の線は？", choices: ["本初子午線", "赤道", "日付変更線", "北回帰線"], correct: "本初子午線", exp: "経度の基準です。"},
                {q: "時差は経度15度につき何時間か？", choices: ["1時間", "30分", "2時間", "15分"], correct: "1時間", exp: "地球は1周360度を24時間で回ります。"},
                {q: "日本の領海は何海里？", choices: ["12海里", "3海里", "200海里", "50海里"], correct: "12海里", exp: "基線から12海里までです。"},
                {q: "排他的経済水域(EEZ)は何海里まで？", choices: ["200海里", "12海里", "50海里", "100海里"], correct: "200海里", exp: "水産資源などを管理できます。"},
                {q: "日本の最東端の島は？", choices: ["南鳥島", "与那国島", "沖ノ鳥島", "択捉島"], correct: "南鳥島", exp: "東京都に属します。"},
                {q: "エジプト文明はどの川の流域？", choices: ["ナイル川", "黄河", "インダス川", "メコン川"], correct: "ナイル川", exp: "エジプトはナイルの賜物と言われます。"},
                {q: "モヘンジョ・ダロは何文明の遺跡？", choices: ["インダス文明", "メソポタミア文明", "中国文明", "エジプト文明"], correct: "インダス文明", exp: "計画都市の遺跡です。"},
                {q: "漢字の原型を作った中国の王朝は？", choices: ["殷", "周", "秦", "漢"], correct: "殷", exp: "甲骨文字が使われました。"},
                {q: "中国を初めて統一した始皇帝の王朝は？", choices: ["秦", "周", "漢", "唐"], correct: "秦", exp: "万里の長城も有名です。"},
                {q: "シルクロードを広めた漢の皇帝は？", choices: ["武帝", "始皇帝", "唐の太宗", "光武帝"], correct: "武帝", exp: "張騫を派遣しました。"},
                {q: "縄文時代の石器は？", choices: ["打製石器", "磨製石器", "青銅器", "鉄器"], correct: "打製石器", exp: "縄文は打製石器が中心です。"},
                {q: "卑弥呼が治めた国は？", choices: ["邪馬台国", "大和政権", "倭国", "百済"], correct: "邪馬台国", exp: "魏志倭人伝に記されています。"},
                {q: "大和政権の古墳として最大級なのは？", choices: ["大仙古墳", "石舞台古墳", "高松塚古墳", "稲荷山古墳"], correct: "大仙古墳", exp: "仁徳天皇陵とも言われます。"},
                {q: "6世紀、百済から伝わったのは？", choices: ["仏教", "儒教", "キリスト教", "道教"], correct: "仏教", exp: "欽明天皇の時代に伝来。"},
                {q: "聖徳太子が定めた役人の心得は？", choices: ["十七条の憲法", "大宝律令", "御成敗式目", "武家諸法度"], correct: "十七条の憲法", exp: "和を尊ぶことを説きました。"},
                {q: "645年の中大兄皇子らの事件は？", choices: ["大化の改新", "応仁の乱", "元寇", "明治維新"], correct: "大化の改新", exp: "律令国家の始まり。"},
                {q: "710年の平城京遷都を行ったのは？", choices: ["元明天皇", "聖武天皇", "桓武天皇", "推古天皇"], correct: "元明天皇", exp: "奈良時代が始まります。"},
                {q: "東大寺を建立した天皇は？", choices: ["聖武天皇", "桓武天皇", "天武天皇", "元明天皇"], correct: "聖武天皇", exp: "鎮護国家の仏教。"},
                {q: "794年の遷都先は？", choices: ["平安京", "平城京", "長岡京", "藤原京"], correct: "平安京", exp: "桓武天皇が遷都しました。"},
                {q: "季節風を何という？", choices: ["モンスーン", "偏西風", "貿易風", "極風"], correct: "モンスーン", exp: "日本の気候に大きな影響。"},
                {q: "日本の標準時子午線は？", choices: ["東経135度", "東経140度", "東経130度", "東経145度"], correct: "東経135度", exp: "明石を通ります。"},
                {q: "古代ローマの闘技場は？", choices: ["コロッセオ", "パルテノン神殿", "凱旋門", "万里の長城"], correct: "コロッセオ", exp: "ローマの遺跡。"},
                {q: "孔子が説いた教えは？", choices: ["儒教", "仏教", "イスラム教", "道教"], correct: "儒教", exp: "仁を重んじました。"},
                {q: "仏教を開いたのは？", choices: ["シャカ", "孔子", "イエス", "ムハンマド"], correct: "シャカ", exp: "インドで始まりました。"},
                {q: "イスラム教を開いたのは？", choices: ["ムハンマド", "シャカ", "イエス", "孔子"], correct: "ムハンマド", exp: "メッカで布教。"},
                {q: "ギリシャ文明のポリスで民主政治と言えば？", choices: ["アテネ", "スパルタ", "ローマ", "マケドニア"], correct: "アテネ", exp: "市民が集まって決定しました。"},
                {q: "埴輪が置かれた場所は？", choices: ["古墳", "神殿", "宮殿", "寺院"], correct: "古墳", exp: "古墳の祭祀用です。"},
                {q: "魏志倭人伝で日本の国名を何と表記した？", choices: ["倭", "日本", "大和", "邪馬台"], correct: "倭", exp: "当時の中国の記録です。"},
                {q: "大化の改新で廃止されたのは？", choices: ["豪族の私有地・私有民", "天皇制", "仏教", "律令"], correct: "豪族の私有地・私有民", exp: "公地公民制へ。"}
            ],
            '2': [
                {q: "藤原氏が摂政や関白として権力を握った政治は？", choices: ["摂関政治", "院政", "武家政治", "専制政治"], correct: "摂関政治", exp: "道長が全盛期を築きました。"},
                {q: "院政を始めたのは？", choices: ["白河上皇", "後白河上皇", "天皇", "藤原道長"], correct: "白河上皇", exp: "上皇が実権を握る政治です。"},
                {q: "源頼朝が幕府を開いたのは何年頃？", choices: ["1185年", "1192年", "1180年", "1221年"], correct: "1185年", exp: "守護・地頭を置きました。"},
                {q: "武士の法として制定されたのは？", choices: ["御成敗式目", "十七条の憲法", "大宝律令", "武家諸法度"], correct: "御成敗式目", exp: "北条泰時が制定。"},
                {q: "モンゴル帝国の襲来を何という？", choices: ["元寇", "応仁の乱", "島原の乱", "戦国時代"], correct: "元寇", exp: "フビライが襲来。"},
                {q: "室町幕府を開いたのは？", choices: ["足利尊氏", "足利義満", "足利義政", "源頼朝"], correct: "足利尊氏", exp: "京都に幕府を開きました。"},
                {q: "日明貿易で使われた証明書は？", choices: ["勘合", "朱印状", "通行手形", "通行証"], correct: "勘合", exp: "日明貿易で使用。"},
                {q: "応仁の乱はいつ？", choices: ["室町時代", "鎌倉時代", "江戸時代", "戦国時代"], correct: "室町時代", exp: "京都を焼け野原にしました。"},
                {q: "戦国時代、織田信長が今川義元を倒した戦いは？", choices: ["桶狭間の戦い", "長篠の戦い", "関ヶ原の戦い", "川中島の戦い"], correct: "桶狭間の戦い", exp: "ここから台頭しました。"},
                {q: "豊臣秀吉の土地測量は？", choices: ["太閤検地", "刀狩", "石高制", "兵農分離"], correct: "太閤検地", exp: "全国の収穫量を把握。"},
                {q: "徳川家康が江戸幕府を開いたのは？", choices: ["1603年", "1600年", "1615年", "1612年"], correct: "1603年", exp: "関ヶ原の戦いのあとです。"},
                {q: "大名に江戸と国元を往復させた制度は？", choices: ["参勤交代", "兵農分離", "鎖国", "検地"], correct: "参勤交代", exp: "幕府の統制強化。"},
                {q: "鎖国を完成させた将軍は？", choices: ["徳川家光", "徳川家康", "徳川綱吉", "徳川吉宗"], correct: "徳川家光", exp: "キリスト教を厳禁。"},
                {q: "ペリーが来航したのは？", choices: ["1853年", "1854年", "1867年", "1868年"], correct: "1853年", exp: "浦賀に来航。"},
                {q: "徳川慶喜が政権を天皇に返したのは？", choices: ["大政奉還", "王政復古", "明治維新", "廃藩置県"], correct: "大政奉還", exp: "江戸幕府の終焉。"},
                {q: "五箇条の御誓文は明治何年のこと？", choices: ["1868年", "1867年", "1871年", "1889年"], correct: "1868年", exp: "明治政府の基本方針。"},
                {q: "地租改正で税金は何で支払うことになった？", choices: ["金銭", "米", "労働", "布"], correct: "金銭", exp: "地価の3%でした。"},
                {q: "鹿鳴館などで象徴される文化は？", choices: ["文明開化", "元禄文化", "化政文化", "大正デモクラシー"], correct: "文明開化", exp: "西洋文化の受容。"},
                {q: "日清戦争の講和条約は？", choices: ["下関条約", "南京条約", "ポーツマス条約", "パリ条約"], correct: "下関条約", exp: "清が日本に台湾などを割譲。"},
                {q: "日露戦争の講和条約は？", choices: ["ポーツマス条約", "下関条約", "パリ条約", "ベルサイユ条約"], correct: "ポーツマス条約", exp: "ロシアとアメリカで調印。"},
                {q: "近代産業育成のための政策は？", choices: ["殖産興業", "富国強兵", "廃藩置県", "明治維新"], correct: "殖産興業", exp: "産業の振興です。"},
                {q: "大正デモクラシーで「民本主義」を唱えたのは？", choices: ["吉野作造", "福沢諭吉", "伊藤博文", "板垣退助"], correct: "吉野作造", exp: "デモクラシーの代表的論者。"},
                {q: "治安維持法は何年？", choices: ["1925年", "1914年", "1929年", "1945年"], correct: "1925年", exp: "社会主義運動を弾圧。"},
                {q: "産業革命はどこで始まった？", choices: ["イギリス", "フランス", "日本", "アメリカ"], correct: "イギリス", exp: "蒸気機関の発明から。"},
                {q: "明治時代の議会開設は何年？", choices: ["1890年", "1889年", "1900年", "1885年"], correct: "1890年", exp: "第1回帝国議会。"}
            ],
            '3': [
                {q: "世界恐慌は何年に始まった？", choices: ["1929年", "1914年", "1939年", "1945年"], correct: "1929年", exp: "株価の大暴落が契機。"},
                {q: "第一次世界大戦は何年から？", choices: ["1914年", "1939年", "1945年", "1918年"], correct: "1914年", exp: "サラエボ事件が引き金。"},
                {q: "日本が敗戦した年号は？", choices: ["1945年", "1941年", "1947年", "1952年"], correct: "1945年", exp: "8月15日、終戦。"},
                {q: "日本国憲法の公布はいつ？", choices: ["1946年", "1947年", "1945年", "1952年"], correct: "1946年", exp: "11月3日に公布されました。"},
                {q: "日本国憲法の施行はいつ？", choices: ["1947年", "1946年", "1945年", "1952年"], correct: "1947年", exp: "5月3日に施行されました。"},
                {q: "憲法9条が定める主義は？", choices: ["平和主義", "国民主権", "基本的人権", "民主主義"], correct: "平和主義", exp: "戦争放棄を定めています。"},
                {q: "衆議院と参議院のどちらが優越するか？", choices: ["衆議院", "参議院", "対等", "天皇"], correct: "衆議院", exp: "衆議院の優越があります。"},
                {q: "最高裁判所の裁判官を国民が審査する制度は？", choices: ["国民審査", "裁判員制度", "陪審制", "弾劾裁判"], correct: "国民審査", exp: "国民の手によるチェックです。"},
                {q: "GDPとは何の略？", choices: ["国内総生産", "国民総所得", "世界総生産", "経済成長率"], correct: "国内総生産", exp: "その国の経済規模を示します。"},
                {q: "3Rの最後のリは？", choices: ["リサイクル", "リフォーム", "リペア", "リバース"], correct: "リサイクル", exp: "Reduce, Reuse, Recycle。"},
                {q: "国際連合の本部があるのは？", choices: ["ニューヨーク", "ジュネーブ", "ロンドン", "パリ"], correct: "ニューヨーク", exp: "世界平和の拠点。"},
                {q: "地方自治の原則は住民自治と何か？", choices: ["団体自治", "中央集権", "地方分権", "直轄自治"], correct: "団体自治", exp: "地方公共団体の自治です。"},
                {q: "何歳から選挙権がある？", choices: ["18歳", "20歳", "16歳", "21歳"], correct: "18歳", exp: "現在は18歳からです。"},
                {q: "マスメディアは世論形成に何の影響を与える？", choices: ["非常に大きい", "全くない", "少しだけ", "限定的"], correct: "非常に大きい", exp: "情報提供の役割。"},
                {q: "所得税は何税？", choices: ["直接税", "間接税", "消費税", "固定資産税"], correct: "直接税", exp: "税を負担する人が直接納める。"},
                {q: "市場価格は需要と何のバランスで決まる？", choices: ["供給", "政府", "企業", "国"], correct: "供給", exp: "価格メカニズムの基本。"},
                {q: "冷戦は米ソの対立だが、もう片方は？", choices: ["ソ連", "ドイツ", "日本", "フランス"], correct: "ソ連", exp: "アメリカとソ連の対立。"},
                {q: "日本が国連に加盟したのは？", choices: ["1956年", "1945年", "1952年", "1964年"], correct: "1956年", exp: "鳩山一郎内閣のとき。"},
                {q: "行政権を持つのは？", choices: ["内閣", "国会", "裁判所", "天皇"], correct: "内閣", exp: "法律の執行を行います。"},
                {q: "衆議院の解散権があるのは？", choices: ["内閣", "天皇", "国会", "最高裁"], correct: "内閣", exp: "内閣が解散を決定します。"},
                {q: "住民税は何税？", choices: ["地方税", "国税", "消費税", "直接税"], correct: "地方税", exp: "市町村に納めます。"},
                {q: "現代の国際社会の課題は？", choices: ["すべて", "戦争", "環境問題", "貧困"], correct: "すべて", exp: "多様な課題があります。"},
                {q: "高度経済成長期はいつごろ？", choices: ["1950年代後半", "1920年代", "1980年代", "1990年代"], correct: "1950年代後半", exp: "戦後の急速な成長。"},
                {q: "バブル経済が崩壊したのは？", choices: ["1990年代初頭", "1980年代", "2000年代", "1970年代"], correct: "1990年代初頭", exp: "好景気の終焉。"},
                {q: "SDGsの目標はいくつ？", choices: ["17", "10", "20", "5"], correct: "17", exp: "持続可能な開発目標。"}
            ]
        };

        let currentQ, currentIdx = 0, currentGrade = '1', score = 0;

        function start(grade) {
            currentGrade = grade;
            currentIdx = 0;
            score = 0;
            document.getElementById('setup').style.display = 'none';
            document.getElementById('quiz').style.display = 'block';
            nextQ();
        }

        function nextQ() {
            const list = db[currentGrade];
            if(currentIdx >= list.length) {
                showResult();
                return;
            }
            
            document.getElementById('feedback-area').style.display = 'none';
            document.getElementById('progress-text').innerText = `${currentIdx + 1} / ${list.length} 問`;
            const percent = (currentIdx / list.length) * 100;
            document.getElementById('score-bar').style.width = percent + "%";
            
            currentQ = list[currentIdx];
            document.getElementById('q-text').innerText = currentQ.q;
            
            const area = document.getElementById('choices-area'); area.innerHTML = '';
            currentQ.choices.forEach(c => {
                const b = document.createElement('button'); b.className = 'choice-btn'; b.innerText = c;
                b.onclick = () => check(b, c); area.appendChild(b);
            });
        }

        function check(btn, ans) {
            const btns = document.querySelectorAll('.choice-btn');
            btns.forEach(b => b.disabled = true); 

            if(ans === currentQ.correct) {
                score++;
                btn.classList.add('correct');
                document.getElementById('res-text').innerText = "正解！";
                document.getElementById('res-text').style.color = "#10b981";
            } else {
                btn.classList.add('incorrect');
                document.getElementById('res-text').innerText = "不正解...";
                document.getElementById('res-text').style.color = "#ef4444";
                btns.forEach(b => { if(b.innerText === currentQ.correct) b.classList.add('correct'); });
            }
            
            document.getElementById('exp-text').innerHTML = "<strong>解説:</strong><br>" + currentQ.exp;
            document.getElementById('feedback-area').style.display = 'block';
            currentIdx++;
        }

        function showResult() {
            const list = db[currentGrade];
            const total = list.length;
            const rate = Math.round((score / total) * 100);
            document.getElementById('quiz').innerHTML = `
                <div style="text-align:center;">
                    <h2>終了！</h2>
                    <div style="font-size:3rem; font-weight:bold;">${score} / ${total}</div>
                    <div style="font-size:1.5rem; color:#64748b; margin-bottom:20px;">正答率: ${rate}%</div>
                    <button class="btn-home" style="padding:15px 30px; font-size:1rem;" onclick="location.reload()">ホームに戻る</button>
                </div>
            `;
        }
    </script>
</body>
</html>
