<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数学 | 一問一答マスター</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Yu Gothic",sans-serif;}
body{background:#eef3f8;}
header{
height:60px;
background:#1e88e5;
color:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
}
header a{
color:white;
text-decoration:none;
font-weight:bold;
}
.point{
background:white;
color:#1e88e5;
padding:8px 15px;
border-radius:10px;
font-weight:bold;
}
main{
max-width:900px;
margin:25px auto;
padding:20px;
}
h1{
text-align:center;
margin-bottom:20px;
}

.menu{
text-align:center;
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
cursor:pointer;
background:#1e88e5;
color:white;
margin:6px;
font-size:17px;
}

button:hover{
background:#1565c0;
}

#game{
display:none;
}

.progressText{
font-weight:bold;
margin-bottom:8px;
}

.progress{
width:100%;
height:18px;
background:#cfd8dc;
border-radius:20px;
overflow:hidden;
margin-bottom:20px;
}

#bar{
width:0%;
height:100%;
background:#43a047;
transition:.3s;
}

.question{
font-size:25px;
font-weight:bold;
margin:20px 0;
}

.choice{
display:block;
width:100%;
margin:10px 0;
padding:14px;
background:white;
color:#222;
border:2px solid #1e88e5;
border-radius:10px;
cursor:pointer;
text-align:left;
font-size:18px;
}

.choice:hover{
background:#e3f2fd;
}

.correct{
background:#43a047!important;
color:white;
}

.wrong{
background:#e53935!important;
color:white;
}

#result{
font-size:28px;
font-weight:bold;
margin-top:15px;
}

#explain{
margin-top:15px;
background:#fff;
padding:15px;
border-left:5px solid orange;
}

#next{
display:none;
width:100%;
margin-top:20px;
}
</style>

</head>
<body>

<header>

<div>
📚 一問一答マスター
</div>

<div>

<a href="index.html">🏠ホーム</a>

<span class="point">
⭐ <span id="point">0</span>P
</span>

</div>

</header>

<main>

<h1>📐 数学</h1>

<div class="menu" id="menu">

<h2>学年を選択</h2>

<button onclick="start(1)">中1</button>
<button onclick="start(2)">中2</button>
<button onclick="start(3)">中3</button>

</div>

<div id="game">

<div class="progressText" id="progressText"></div>

<div class="progress">
<div id="bar"></div>
</div>

<div class="question" id="question"></div>

<div id="choices"></div>

<div id="result"></div>

<div id="explain"></div>

<button id="next" onclick="nextQuestion()">
次の問題 ▶
</button>

</div>

</main>

<script>

const pointText=document.getElementById("point");

let point=Number(localStorage.getItem("point"))||0;
pointText.textContent=point;

let current=0;
let answered=false;
let questions=[];

const db={

1:[
{
q:"(-5)+8=?",
c:["2","3","4","5","6"],
a:1,
ex:"8-5=3"
},
{
q:"2(x+3)を展開すると？",
c:["2x+6","2x+3","x+6","2x+9","x+3"],
a:0,
ex:"分配法則で2x+6"
}
],

2:[
{
q:"2x=18 のxは？",
c:["7","8","9","10","11"],
a:2,
ex:"18÷2=9"
},
{
q:"y=5x の傾きは？",
c:["3","4","5","6","7"],
a:2,
ex:"xの係数"
}
],

3:[
{
q:"√64は？",
c:["6","7","8","9","10"],
a:2,
ex:"8×8=64"
},
{
q:"三平方の定理は？",
c:[
"a+b=c",
"a²+b²=c²",
"a=b+c",
"ab=c²",
"a²=b²"
],
a:1,
ex:"直角三角形で成り立つ公式"
}

};

function start(g){

current=0;
answered=false;

questions=[...db[g]];

// ランダム
questions.sort(()=>Math.random()-0.5);

document.getElementById("menu").style.display="none";
document.getElementById("game").style.display="block";

showQuestion();

}

function showQuestion(){

answered=false;

let q=questions[current];

document.getElementById("progressText").innerHTML=
"問題 "+(current+1)+" / "+questions.length;

document.getElementById("bar").style.width=
((current+1)/questions.length*100)+"%";

document.getElementById("question").innerHTML=q.q;

let html="";

q.c.forEach((choice,index)=>{

html+=`
<button class="choice"
onclick="answer(${index})">
${choice}
</button>
`;

});

document.getElementById("choices").innerHTML=html;

document.getElementById("result").innerHTML="";
document.getElementById("explain").innerHTML="";
document.getElementById("next").style.display="none";

}

function answer(select){

if(answered)return;

answered=true;

const q=questions[current];

const buttons=document.querySelectorAll(".choice");

buttons.forEach((btn,index)=>{

btn.disabled=true;

if(index===q.a){
btn.classList.add("correct");
}

if(index===select&&select!==q.a){
btn.classList.add("wrong");
}

});

localStorage.setItem(
"mathAnswered",
(Number(localStorage.getItem("mathAnswered"))||0)+1
);

if(select===q.a){

document.getElementById("result").innerHTML=
"⭕ 正解！ +2P";

point+=2;

localStorage.setItem("point",point);

pointText.textContent=point;

localStorage.setItem(
"mathCorrect",
(Number(localStorage.getItem("mathCorrect"))||0)+1
);

}else{

document.getElementById("result").innerHTML=
"❌ 不正解";

}

document.getElementById("explain").innerHTML=
"<b>解説</b><br>"+q.ex;

document.getElementById("next").style.display="block";

}

function nextQuestion(){

current++;

if(current>=questions.length){

alert("終了！");

location.href="index.html";

return;

}

showQuestion();

}

</script>

</body>
</html>
