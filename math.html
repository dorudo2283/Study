<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一問一答 - 数学</title>
    <style>
        body { margin: 0; padding-top: 80px; font-family: sans-serif; background: #f1f5f9; box-sizing: border-box; }
        header { position: fixed; top: 0; width: 100%; height: 70px; background: #1e293b; color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .header-stats { text-align: right; font-size: 0.85rem; }
        .box { background: white; padding: 25px; border-radius: 16px; margin: 0 15px 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .choice-btn { display: block; width: 100%; padding: 18px; margin: 12px 0; background: white; border: 2px solid #2563eb; border-radius: 12px; font-size: 1.1rem; cursor: pointer; }
        #next-btn { background: #22c55e; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #explanation { margin-top: 20px; padding: 20px; background: #f0fdf4; border-left: 6px solid #22c55e; display: none; border-radius: 4px; }
    </style>
</head>
<body>
    <header>
        <div style="font-weight:bold;">一問一答勉強WEBサイト</div>
        <div class="header-stats">
            <span id="pts-display">ポイント: 0</span> | <span id="acc-display">正答率: 0%</span><br>
            <a href="index.html" style="color:#bfdbfe;">ホーム</a> <span id="next-area"></span>
        </div>
    </header>

    <div id="setup" class="box">
        <h3>数学 学習設定</h3>
        学年: <select id="grade-sel" style="width:100%; padding:10px; margin:10px 0;"><option value="1">中1</option><option value="2">中2</option><option value="3">中3</option></select>
        問題数: <select id="count-sel" style="width:100%; padding:10px; margin:10px 0;"><option value="5">5問</option><option value="10">10問</option></select>
        <button onclick="startQuiz()" style="width:100%; padding:15px; margin-top:10px; background:#2563eb; color:white; border:none; border-radius:12px; font-weight:bold;">学習開始</button>
    </div>

    <div id="quiz" class="box" style="display:none;">
        <div id="q-text" style="font-weight:bold; font-size:1.3rem; margin-bottom:20px;"></div>
        <div id="choices-area"></div>
        <div id="explanation"></div>
    </div>

    <script>
        const db = {
            '1': [{q: "-5 + 8 = ?", choices: ["1", "2", "3", "4", "5"], correct: "3", exp: "負の数と正の数の足し算です。"}],
            '2': [{q: "x+y=5, x-y=1 のxは？", choices: ["1", "2", "3", "4", "5"], correct: "3", exp: "足すと2x=6なのでx=3です。"}],
            '3': [{q: "(x+2)²の展開は？", choices: ["x²+2x+4", "x²+4x+4", "x²+4", "x²+2x+2", "x²+4x+2"], correct: "x²+4x+4", exp: "公式 (a+b)² = a²+2ab+b² です。"}]
        };

        function updateStats() {
            const p = localStorage.getItem('totalPoints') || '0';
            const t = parseInt(localStorage.getItem('totalAnswers') || 0);
            const c = parseInt(localStorage.getItem('totalCorrect') || 0);
            const a = t > 0 ? Math.round((c / t) * 100) : 0;
            document.getElementById('pts-display').innerText = "ポイント: " + p;
            document.getElementById('acc-display').innerText = "正答率: " + a + "%";
        }
        updateStats();

        let currentQ, currentCount = 0, targetCount = 0;
        function startQuiz() {
            targetCount = document.getElementById('count-sel').value;
            document.getElementById('setup').style.display = 'none';
            document.getElementById('quiz').style.display = 'block';
            showQ();
        }
        function showQ() {
            if(currentCount >= targetCount) { alert("終了！"); location.href='index.html'; return; }
            document.getElementById('next-area').innerHTML = '';
            document.getElementById('explanation').style.display = 'none';
            const grade = document.getElementById('grade-sel').value;
            currentQ = db[grade][Math.floor(Math.random()*db[grade].length)];
            document.getElementById('q-text').innerText = currentQ.q;
            const area = document.getElementById('choices-area'); area.innerHTML = '';
            currentQ.choices.forEach(c => {
                const b = document.createElement('button'); b.className = 'choice-btn'; b.innerText = c;
                b.onclick = () => reveal(c);
                area.appendChild(b);
            });
        }
        function reveal(ans) {
            const exp = document.getElementById('explanation');
            exp.style.display = 'block';
            exp.innerText = (ans === currentQ.correct ? "正解！" : "不正解...") + " 解説: " + currentQ.exp;
            
            let t = parseInt(localStorage.getItem('totalAnswers')||0) + 1;
            localStorage.setItem('totalAnswers', t);
            if(ans === currentQ.correct) {
                let p = parseInt(localStorage.getItem('totalPoints')||0) + 2;
                localStorage.setItem('totalPoints', p);
                let c = parseInt(localStorage.getItem('totalCorrect')||0) + 1;
                localStorage.setItem('totalCorrect', c);
            }
            updateStats();
            document.getElementById('next-area').innerHTML = '<button id="next-btn" onclick="currentCount++; showQ();">次へ</button>';
        }
    </script>
</body>
</html>
