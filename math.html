<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数学 | 一問一答マスター</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Yu Gothic",sans-serif;}
body{background:#eef3f8;}
header{
height:60px;
background:#1e88e5;
color:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
}
header a{
color:white;
text-decoration:none;
font-weight:bold;
}
.point{
background:white;
color:#1e88e5;
padding:8px 15px;
border-radius:10px;
font-weight:bold;
}
main{
max-width:900px;
margin:25px auto;
padding:20px;
}
h1{
text-align:center;
margin-bottom:20px;
}

.menu{
text-align:center;
}

/* 追加: 設定エリアのスタイル */
.settings {
margin-bottom: 20px;
background: white;
padding: 15px;
border-radius: 10px;
display: inline-block;
}
.settings select {
padding: 5px 10px;
font-size: 16px;
border-radius: 5px;
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
cursor:pointer;
background:#1e88e5;
color:white;
margin:6px;
font-size:17px;
}

button:hover{
background:#1565c0;
}

#game, #final-result {
display:none;
}

.progressText{
font-weight:bold;
margin-bottom:8px;
}

.progress{
width:100%;
height:18px;
background:#cfd8dc;
border-radius:20px;
overflow:hidden;
margin-bottom:20px;
}

#bar{
width:0%;
height:100%;
background:#43a047;
transition:.3s;
}

.question{
font-size:25px;
font-weight:bold;
margin:20px 0;
}

.choice{
display:block;
width:100%;
margin:10px 0;
padding:14px;
background:white;
color:#222;
border:2px solid #1e88e5;
border-radius:10px;
cursor:pointer;
text-align:left;
font-size:18px;
}

.choice:hover{
background:#e3f2fd;
}

.correct{
background:#43a047!important;
color:white;
}

.wrong{
background:#e53935!important;
color:white;
}

#result{
font-size:28px;
font-weight:bold;
margin-top:15px;
}

#explain{
margin-top:15px;
background:#fff;
padding:15px;
border-left:5px solid orange;
}

#next{
display:none;
width:100%;
margin-top:20px;
}

/* 追加: 最終結果画面のスタイル */
#final-result {
text-align: center;
background: white;
padding: 30px;
border-radius: 10px;
box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}
.result-stats {
font-size: 22px;
margin: 15px 0;
font-weight: bold;
}
.result-rate {
font-size: 28px;
color: #e53935;
margin: 15px 0;
font-weight: bold;
}
.result-point {
font-size: 20px;
color: #1e88e5;
margin-bottom: 20px;
}
</style>

</head>
<body>

<header>
<div>📚 一問一答マスター</div>
<div>
<a href="index.html">🏠ホーム</a>
<span class="point">⭐ <span id="point">0</span>P</span>
</div>
</header>

<main>

<h1>📐 数学</h1>

<div class="menu" id="menu">

  <div class="settings">
    <label for="q-count"><b>出題数：</b></label>
    <select id="q-count">
      <option value="1">1問</option>
      <option value="5" selected>5問</option>
      <option value="10">10問</option>
      <option value="20">20問</option>
      <option value="30">30問</option>
      <option value="40">40問</option>
      <option value="50">50問</option>
      <option value="75">75問</option>
      <option value="100">100問</option>
    </select>
  </div>

  <h2>学年を選択してスタート</h2>
  <button onclick="start(1)">中1</button>
  <button onclick="start(2)">中2</button>
  <button onclick="start(3)">中3</button>
</div>

<div id="game">
  <div class="progressText" id="progressText"></div>
  <div class="progress">
    <div id="bar"></div>
  </div>
  <div class="question" id="question"></div>
  <div id="choices"></div>
  <div id="result"></div>
  <div id="explain"></div>
  <button id="next" onclick="nextQuestion()">次の問題 ▶</button>
</div>

<div id="final-result">
  <h2>🎉 結果発表 🎉</h2>
  <div class="result-stats" id="final-score">正解数: 0 / 0問</div>
  <div class="result-rate" id="final-rate">正答率: 0%</div>
  <div class="result-point" id="final-earned-points">獲得ポイント: +0P</div>
  <button onclick="location.reload()">もう一回やる</button>
  <button onclick="location.href='index.html'" style="background: #757575;">ホームへ戻る</button>
</div>

</main>

<script>
const pointText = document.getElementById("point");
let point = Number(localStorage.getItem("point")) || 0;
pointText.textContent = point;

let current = 0;
let answered = false;
let questions = [];

// 追加: 今回のプレイでの正解数をカウントする変数
let correctCount = 0; 

const db = {
  1:[
    { q: "0より小さい数を表すために使う、「-」の符号を何というか？", c: ["正の符号", "負の符号", "加法の符号", "減法の符号"], a: 1, ex: "0より小さい数はマイナス（負の符号）をつけます。" },
    { q: "1, 2, 3 などの「正の整数」の集まりを、特に何というか？", c: ["自然数", "有理数", "素数", "実数"], a: 0, ex: "1から始まる正の整数を自然数と呼びます。" },
    { q: "数直線上で、ある数に対応する点と「原点（0）」との距離を何というか？", c: ["絶対値", "項", "係数", "変域"], a: 0, ex: "原点からの距離なので、符号を取った大きさ（プラスの数）になります。" },
    { q: "+5の絶対値と、-5の絶対値の大きさの関係はどうなっているか？", c: ["+5の方が大きい", "-5の方が大きい", "どちらも同じ", "比べられない"], a: 2, ex: "どちらも原点からの距離は「5」なので同じ大きさです。" },
    { q: "加法（足し算）の計算結果のことを何というか？", c: ["和", "差", "積", "商"], a: 0, ex: "足し算は「和」、引き算は「差」、掛け算は「積」、割り算は「商」です。" },
    { q: "減法（引き算）の計算結果のことを何というか？", c: ["和", "差", "積", "商"], a: 1, ex: "引き算の結果は「差」といいます。" },
    { q: "乗法（掛け算）の計算結果のことを何というか？", c: ["和", "差", "積", "商"], a: 2, ex: "掛け算の結果は「積」といいます。" },
    { q: "除法（割り算）の計算結果のことを何というか？", c: ["和", "差", "積", "商"], a: 3, ex: "割り算の結果は「商」といいます。" },
    { q: "「a + b = b + a」のように、足す順序を入れ替えても答えが同じになる法則は？", c: ["加法の交換法則", "加法の結合法則", "分配法則", "乗法の交換法則"], a: 0, ex: "順序を「交換」しても成り立つので交換法則です。" },
    { q: "「(a + b) + c = a + (b + c)」のように、足す組み合わせを変えても答えが同じになる法則は？", c: ["加法の交換法則", "加法の結合法則", "分配法則", "乗法の結合法則"], a: 1, ex: "前後のどちらを先に「結合」しても成り立つので結合法則です。" },
    // --- 【正負の数】計算 ---
    { q: "(-8) + (+5) = ?", c: ["-13", "-3", "3", "13"], a: 1, ex: "異符号の足し算は、絶対値が大きい方の符号（マイナス）を使い、数の差（8-5）を求めます。" },
    { q: "(-3) - (-9) = ?", c: ["-12", "-6", "6", "12"], a: 2, ex: "引き算は引く数の符号を変えて足すので、(-3) + (+9) = 6 となります。" },
    { q: "(-4) × (-5) = ?", c: ["-20", "20", "-9", "9"], a: 1, ex: "負の数 × 負の数 は、答えが 正の数（プラス）になります。" },
    { q: "(-2)の3乗（-2を3回かける計算）の答えは？", c: ["-6", "6", "-8", "8"], a: 2, ex: "(-2) × (-2) × (-2) = -8 です。マイナスが3個（奇数個）なので符号はマイナスです。" },
    { q: "24 ÷ (-6) = ?", c: ["4", "-4", "18", "-18"], a: 1, ex: "正の数 ÷ 負の数 は、答えが 負の数（マイナス）になります。" },
    { q: "(-12) ÷ (-3) = ?", c: ["4", "-4", "36", "-36"], a: 0, ex: "負の数 ÷ 負の数 は、答えが 正の数（プラス）になります。" },
    { q: "5 - (-3) × 2 = ?", c: ["16", "4", "11", "-1"], a: 2, ex: "掛け算を先に計算します。(-3) × 2 = -6。よって 5 - (-6) = 5 + 6 = 11 です。" },
    { q: "(-2) × 3 + (-4) = ?", c: ["-10", "-2", "2", "10"], a: 0, ex: "掛け算を先に計算します。(-2) × 3 = -6。これに -4 を足すので -10 です。" },
    { q: "10 - 4 ÷ (-2) = ?", c: ["3", "-3", "12", "8"], a: 2, ex: "割り算を先に計算します。4 ÷ (-2) = -2。よって 10 - (-2) = 10 + 2 = 12 です。" },
    { q: "(-3)² = ?", c: ["-6", "6", "-9", "9"], a: 3, ex: "(-3) × (-3) のことなので、マイナス同士の掛け算で答えは +9 になります。" },
    { q: "-3² = ?", c: ["-6", "6", "-9", "9"], a: 2, ex: "これは「3の2乗にマイナスをつけたもの」なので、-(3 × 3) = -9 となります。カッコの有無に注意！" },
    // --- 【文字と式】言葉・法則 ---
    { q: "式の中で、加法の記号「+」で結ばれたそれぞれの部分を何というか？", c: ["項", "係数", "次数", "符号"], a: 0, ex: "5x - 3y という式は、5x と -3y という2つの「項」からできています。" },
    { q: "文字を含む項で、文字にかけられている数字の部分を何というか？", c: ["項", "係数", "次数", "定数"], a: 1, ex: "例えば 4x の「4」の部分を、xの係数といいます。" },
    { q: "式「3x - y」において、yの項の係数は何か？", c: ["3", "1", "-1", "なし"], a: 2, ex: "-y は -1 × y のことなので、yの係数は -1 です。" },
    { q: "「a(b + c) = ab + ac」のように、カッコの外の数を中のすべての項にそれぞれかける法則は？", c: ["交換法則", "結合法則", "分配法則", "等式の性質"], a: 2, ex: "カッコの中の項に数字を「分配」してかけるので分配法則です。" },
    { q: "文字を使った式のルールで、x × 7 はどう表すのが正しいか？", c: ["x7", "7x", "7+x", "7×x"], a: 1, ex: "掛け算の記号を省き、数字を文字の前に書くのがルールです。" },
    { q: "同じ文字の掛け算で、x × x × x を表す右上の小さな数字（指数）を何というか？", c: ["係数", "項", "次数", "累乗の指数"], a: 3, ex: "同じ数をいくつか掛け合わせたものを累乗といい、右上の数を指数といいます。" },
    { q: "文字の代わりに数を当てはめる（置き換える）ことを何というか？", c: ["代入", "移項", "展開", "因数分解"], a: 0, ex: "文字に数字を「代わりに注入する」ので代入です。" },
    { q: "1つの項のなかで、かけられている文字の個数を何というか？", c: ["項", "係数", "次数", "定数"], a: 2, ex: "例えば 3x² はxが2個かけられているので次数は2、5xyは文字が2個なので次数は2です。" },
    { q: "最も大きい次数が1である式を何というか？", c: ["一次式", "二次式", "単項式", "多項式"], a: 0, ex: "最高次数が1の式（例: 2x + 1）を一次式といいます。" },
    // --- 【文字と式】計算 ---
    { q: "4x - 9x = ?", c: ["-5", "5x", "-5x", "13x"], a: 2, ex: "(4 - 9)x = -5x となります。同類項の係数を計算します。" },
    { q: "3(2x - 4) を展開すると？", c: ["6x - 4", "6x - 12", "5x - 7", "6x + 12"], a: 1, ex: "分配法則で3を両方にかけます。3 × 2x ＋ 3 × (-4) ＝ 6x - 12。" },
    { q: "x = -3 のとき、2x + 7 の値（式の値）は？", c: ["1", "13", "-1", "4"], a: 0, ex: "2 × (-3) + 7 = -6 + 7 = 1 となります。" },
    { q: "a = 4 のとき、-a² の値は？", c: ["16", "-16", "8", "-8"], a: 1, ex: "-(4 × 4) となるため、答えは -16 です。" },
    { q: "(5x - 3) + (2x + 7) = ?", c: ["7x + 4", "7x - 10", "3x + 4", "10x - 21"], a: 0, ex: "5x + 2x = 7x、-3 + 7 = 4。合わせて 7x + 4 です。" },
    { q: "(3x - 5) - (x - 2) = ?", c: ["2x - 7", "2x - 3", "4x - 7", "2x + 3"], a: 1, ex: "カッコを外すと 3x - 5 - x + 2 となるので、2x - 3 です。後ろの項の符号反転に注意！" },
    { q: "12x ÷ (-4) = ?", c: ["-3x", "3x", "-8x", "-3"], a: 0, ex: "数字の部分を割り算して、12 ÷ (-4) = -3。これに文字をつけて -3x です。" },
    // --- 【方程式】言葉・法則 ---
    { q: "2つの数量が等しいことを、等号「=」を使って表した式を何というか？", c: ["等式", "不等式", "方程式", "比例式"], a: 0, ex: "「＝」を使った式はすべて等式です。左側を左辺、右側を右辺といいます。" },
    { q: "まだ分かっていない文字を含み、その文字に特定の値を代入したときだけ成り立つ等式は？", c: ["等式", "不等式", "方程式", "関数"], a: 2, ex: "xの値を求めるための等式を方程式といいます。" },
    { q: "方程式を成り立たせる文字の値を、その方程式の何というか？", c: ["解", "根", "係数", "定数"], a: 0, ex: "方程式を解いて求めたxの値を「解（かい）」といいます。" },
    { q: "等式において、項の符号を変えてもう一方の辺に移動させることを何というか？", c: ["代入", "移項", "展開", "通分"], a: 1, ex: "＋をーに、ーを＋に変えてイコール（＝）を越えさせる操作を移項といいます。" },
    { q: "「等式の両辺に同じ数を足しても、等式は成り立つ」というきまりを何というか？", c: ["等式の性質", "移項の法則", "分配法則", "比例の性質"], a: 0, ex: "天秤の両側に同じ重さを足しても釣り合いは取れる、という等式の基本性質です。" },
    // --- 【方程式】計算 ---
    { q: "方程式 x - 7 = 3 の解は？", c: ["x = -4", "x = 4", "x = 10", "x = -10"], a: 2, ex: "-7を右辺に移項して符号を変えると、x = 3 + 7 となり、x = 10 です。" },
    { q: "方程式 4x = 2x + 8 の解は？", c: ["x = 2", "x = 4", "x = -4", "x = 8"], a: 1, ex: "2xを左辺に移項して、4x - 2x = 8 → 2x = 8 → 両辺を2で割って x = 4 です。" },
    { q: "方程式 3x + 2 = 14 の解は？", c: ["x = 4", "x = 3", "x = 5", "x = 2"], a: 0, ex: "2を右辺に移項して 3x = 12、両辺を3で割って x = 4 です。" },
    { q: "方程式 5x - 8 = -3 の解は？", c: ["x = 1", "x = -1", "x = 2", "x = -5"], a: 0, ex: "-8を移項して 5x = -3 + 8 → 5x = 5。両辺を5で割って x = 1 です。" },
    { q: "方程式 -2x = 10 の解は？", c: ["x = -5", "x = 5", "x = -12", "x = 8"], a: 0, ex: "両辺をxの係数である -2 で割ります。10 ÷ (-2) = -5 です。" },
    { q: "比例式 x : 4 = 3 : 2 の解は？", c: ["x = 6", "x = 8", "x = 12", "x = 2"], a: 0, ex: "比例式は「内側の積＝外側の積」なので、2x = 12 となり、x = 6 です。" },
    // --- 【比例・反比例】言葉・概念 ---
    { q: "xやyのように、いろいろな値をとることができる文字のことを何というか？", c: ["定数", "変数", "係数", "関数"], a: 1, ex: "「変化する数」なので変数といいます。決まった数は定数です。" },
    { q: "変数がとることができる値の範囲のことを何というか？", c: ["変域", "領域", "限界", "座標"], a: 0, ex: "変数の「区域」という意味で変域と呼びます。以上、以下、未満などを使って表します。" },
    { q: "yがxに比例するとき、式 y = ax の定数 a を何というか？", c: ["傾き", "切片", "比例定数", "変化の割合"], a: 2, ex: "中学1年では、この決まった数字 a を「比例定数」と呼びます。" },
    { q: "平面上の位置を表す、(横の位置, 縦の位置)の数字の組を何というか？", c: ["座標", "変域", "目盛", "アドレス"], a: 0, ex: "点Pの位置を (3, 4) のようにx軸とy軸の数字で表したものを座標といいます。" },
    { q: "座標のすべての基準となる、x軸とy軸が交わる点(0, 0)のことを何というか？", c: ["始点", "基点", "原点", "中心"], a: 2, ex: "アルファベットのO（オー）で表される中心の点を原点といいます。" },
    { q: "反比例 y = a/x のグラフの形を何というか？", c: ["直線", "放物線", "双曲線", "楕円"], a: 2, ex: "x軸とy軸に近づきながら、2本が対になって伸びるなめらかな曲線なので「双曲線」といいます。" },
    { q: "比例 y = 3x のグラフは、必ずどこを通る直線になるか？", c: ["原点", "点(1, 1)", "y軸のプラス部分", "どこも通らない"], a: 0, ex: "比例のグラフは、x=0のときy=0になるため、必ず原点(0,0)を通る直線になります。" },
    { q: "yがxに反比例するとき、xの値が2倍, 3倍になると、yの値はどうなるか？", c: ["2倍, 3倍になる", "1/2倍, 1/3倍になる", "4倍, 9倍になる", "変化しない"], a: 1, ex: "反比例では、一方が2倍、3倍になると、もう一方は逆数である 1/2倍、1/3倍になります。" },
    // --- 【平面図形】言葉・概念 ---
    { q: "2つの直線が交わってできる向かい合った角で、大きさが常に等しくなる角は？", c: ["同位角", "錯角", "対頂角", "補角"], a: 2, ex: "バツ印（X）の向かい合う角を対頂角といい、角度は常に同じです。" },
    { q: "1つの直線に垂直な2つの直線は、お互いにどのような位置関係にあるか？", c: ["交わる", "垂直である", "平行である", "ねじれの位置にある"], a: 2, ex: "同じ角度で立っている2本の直線は、どこまでいっても交わらない「平行」になります。" },
    { q: "円のまわりの、一部分の曲線部分のことを何というか？", c: ["弧（こ）", "弦（げん）", "半径", "直径"], a: 0, ex: "弓の「弧」のように曲がった部分を指し、記号「⌒」を使って表します。" },
    { q: "円周上の2点をまっすぐ結んだ線分のことを何というか？", c: ["弧", "弦（げん）", "直径", "割線"], a: 1, ex: "弓の「弦（つる）」のようにまっすぐ張った線なので弦といいます。" },
    { q: "円の2本の半径と、1つの弧で囲まれた、扇子のような形をした図形は？", c: ["三角形", "四角形", "おうぎ形", "半円"], a: 2, ex: "文字通り「扇（おうぎ）」の形をした図形です。開いた角度を「中心角」といいます。" },
    { q: "直線上の1点から引いた、その直線に垂直な線のことを何というか？", c: ["垂線", "平行線", "対角線", "接線"], a: 0, ex: "90度で交わる直線のことを垂線（すいせん）といいます。" },
    { q: "線分を真っ二つに等分し、かつその線分に垂直な直線を何というか？", c: ["垂直二等分線", "角の二等分線", "垂線", "中心線"], a: 0, ex: "線分の中点を通り、垂直に交わる直線なので垂直二等分線です。両端の点からの距離が等しくなります。" },
    // --- 【空間図形・データの活用】 ---
    { q: "すべての面が合同な正多角形で、頂点に集まる面の数が等しい立体を何というか？", c: ["正多面体", "正角柱", "正角錐", "回転体"], a: 0, ex: "正四面体、正六面体、正八面体、正十二面体、正二十面体の5種類しかありません。" },
    { q: "長方形を、1つの辺を軸として1回転させてできる立体は何か？", c: ["円錐", "円柱", "球", "三角柱"], a: 1, ex: "長方形を軸を中心に回すと、缶詰のような形の「円柱」ができます。" },
    { q: "データをいくつかの区間に分けた、その区間一つひとつを何というか？", c: ["階級", "度数", "範囲", "代表値"], a: 0, ex: "「10点以上20点未満」といった、データを整理するための区切りのことを階級といいます。" },
    { q: "各階級に含まれるデータの個数（人数や物の数など）のことを何というか？", c: ["階級値", "度数", "相対度数", "平均値"], a: 1, ex: "その階級にどれだけのデータが集まっているかの「頻度（数）」を度数といいます。" }
  ],
  2:[
    { q:"2x=18 のxは？", c:["7","8","9","10","11"], a:2, ex:"18÷2=9" },
    { q:"y=5x の傾きは？", c:["3","4","5","6","7"], a:2, ex:"xの係数" }
  ],
  3:[
    { q:"√64は？", c:["6","7","8","9","10"], a:2, ex:"8×8=64" },
    { q:"三平方の定理は？", c:["a+b=c","a²+b²=c²","a=b+c","ab=c²","a²=b²"], a:1, ex:"直角三角形で成り立つ公式" }
  ]
};

function start(g) {
  current = 0;
  correctCount = 0; // リセット
  answered = false;

  // 選択された問題数を取得
  const selectedCount = Number(document.getElementById("q-count").value);

  // 対象学年の問題をコピーしてシャッフル
  let allQuestions = [...db[g]];
  allQuestions.sort(() => Math.random() - 0.5);

  // シャッフルした問題の中から、選択された問題数だけ切り取る（実際のDB問題数が少ない場合は最大数に合わせる）
  questions = allQuestions.slice(0, Math.min(selectedCount, allQuestions.length));

  document.getElementById("menu").style.display = "none";
  document.getElementById("game").style.display = "block";

  showQuestion();
}

function showQuestion() {
  answered = false;
  let q = questions[current];

  document.getElementById("progressText").innerHTML = "問題 " + (current + 1) + " / " + questions.length;
  document.getElementById("bar").style.width = ((current + 1) / questions.length * 100) + "%";
  document.getElementById("question").innerHTML = q.q;

  let html = "";
  q.c.forEach((choice, index) => {
    html += `<button class="choice" onclick="answer(${index})">${choice}</button>`;
  });

  document.getElementById("choices").innerHTML = html;
  document.getElementById("result").innerHTML = "";
  document.getElementById("explain").innerHTML = "";
  document.getElementById("next").style.display = "none";
}

function answer(select) {
  if (answered) return;
  answered = true;

  const q = questions[current];
  const buttons = document.querySelectorAll(".choice");

  buttons.forEach((btn, index) => {
    btn.disabled = true;
    if (index === q.a) {
      btn.classList.add("correct");
    }
    if (index === select && select !== q.a) {
      btn.classList.add("wrong");
    }
  });

  localStorage.setItem("mathAnswered", (Number(localStorage.getItem("mathAnswered")) || 0) + 1);

  if (select === q.a) {
    document.getElementById("result").innerHTML = "⭕ 正解！ +2P";
    
    // 正解数とポイントを加算
    correctCount++;
    point += 2;
    localStorage.setItem("point", point);
    pointText.textContent = point;
    localStorage.setItem("mathCorrect", (Number(localStorage.getItem("mathCorrect")) || 0) + 1);
  } else {
    document.getElementById("result").innerHTML = "❌ 不正解";
  }

  document.getElementById("explain").innerHTML = "<b>解説</b><br>" + q.ex;
  document.getElementById("next").style.display = "block";
}

function nextQuestion() {
  current++;

  if (current >= questions.length) {
    // 全問終了したら結果画面を表示する
    showFinalResult();
    return;
  }

  showQuestion();
}

// 追加: 最終結果を表示する関数
function showFinalResult() {
  document.getElementById("game").style.display = "none";
  document.getElementById("final-result").style.display = "block";

  // 正答率の計算 (小数点以下四捨五入)
  const rate = Math.round((correctCount / questions.length) * 100);
  // 今回の獲得ポイント
  const earnedPoints = correctCount * 2;

  document.getElementById("final-score").innerHTML = `正解数: ${correctCount} / ${questions.length}問`;
  document.getElementById("final-rate").innerHTML = `正答率: ${rate}%`;
  document.getElementById("final-earned-points").innerHTML = `獲得ポイント: +${earnedPoints}P`;
}

</script>
