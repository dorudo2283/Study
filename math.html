<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数学クイズ</title>

<style>
body{font-family:Yu Gothic;background:#f4f7fb;margin:0;padding:0;}
header{background:#1e88e5;color:#fff;padding:15px;text-align:center;font-size:20px;}

.container{max-width:800px;margin:auto;padding:20px;}

.btn{
padding:10px 15px;margin:5px;border:none;border-radius:10px;
background:#fff;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.1);
display:block;width:100%;
}

.btn:hover{transform:scale(1.02)}

.choice{background:#fff;padding:15px;border-radius:12px;margin:10px 0;cursor:pointer;}

.correct{background:#4caf50;color:#fff;}
.wrong{background:#f44336;color:#fff;}

.hidden{display:none;}

#questionBox{
background:#fff;padding:20px;border-radius:12px;margin-top:20px;
}

#explain{
margin-top:10px;background:#fff;padding:10px;border-radius:10px;
}

</style>
</head>
<body>

<header>📐 数学クイズ</header>

<div class="container">

<div id="gradeSelect">
<h3>学年を選択</h3>
<button class="btn" onclick="start(1)">中1</button>
<button class="btn" onclick="start(2)">中2</button>
<button class="btn" onclick="start(3)">中3</button>
</div>

<div id="game" class="hidden">

<div id="questionBox">
<div id="q"></div>
<div id="choices"></div>
</div>

<div id="result"></div>
<div id="explain"></div>

<button class="btn" onclick="next()">次へ</button>

</div>

</div>

<script>

let grade = 1;
let index = 0;
let questions = [];

/* =========================
   問題データ（拡張OK）
========================= */

const db = {

1:[ // 中1（ちゃんと中学生）
{
q:"(-3) + 5 = ?",
c:["-8","-2","2","8","-1"],
a:2,
ex:"符号が違うときは大きい方から小さい方を引く。5-3=2"
},
{
q:"(-4) × (-2) = ?",
c:["-8","8","-6","6","-2"],
a:1,
ex:"マイナス×マイナスはプラス"
},
{
q:"2(x + 3) を展開すると？",
c:["2x+3","2x+6","x+6","2x+9","x+3"],
a:1,
ex:"分配法則 2×x + 2×3 = 2x+6"
},
{
q:"x + 7 = 12 の x は？",
c:["3","4","5","6","7"],
a:2,
ex:"12-7=5"
},
{
q:"比例 y=3x のとき x=4 の y は？",
c:["7","10","12","14","16"],
a:2,
ex:"3×4=12"
},
{
q:"直線上の2点(1,2),(3,6)の変化の割合は？",
c:["1","2","3","4","5"],
a:1,
ex:"(6-2)/(3-1)=4/2=2"
}
],

2:[ // 中2
{
q:"x + 3 = 7 の x は？",
c:["2","3","4","5","6"],
a:2,
ex:"7-3=4"
},
{
q:"2x = 10 の x は？",
c:["2","3","4","5","6"],
a:3,
ex:"10÷2=5"
},
{
q:"一次関数 y=2x の傾きは？",
c:["1","2","3","4","5"],
a:1,
ex:"xの係数が傾き"
}
],

3:[ // 中3
{
q:"√9 = ?",
c:["1","2","3","4","5"],
a:2,
ex:"3×3=9"
},
{
q:"2x+1=7 の x は？",
c:["2","3","4","5","6"],
a:2,
ex:"2x=6 → x=3"
},
{
q:"三平方の定理は？",
c:["a+b=c","a²+b²=c²","a=b+c","ab=c²","a²=b²"],
a:1,
ex:"直角三角形の基本公式"
}
]

};

/* ========================= */

let point = Number(localStorage.getItem("point")) || 0;

function start(g){
grade = g;
questions = db[g];
index = 0;

document.getElementById("gradeSelect").classList.add("hidden");
document.getElementById("game").classList.remove("hidden");

show();
}

function show(){

let q = questions[index];

document.getElementById("q").innerText =
"Q" + (index+1) + " " + q.q;

let html = "";

q.c.forEach((c,i)=>{
html += `<button class="btn" onclick="answer(${i})">${c}</button>`;
});

document.getElementById("choices").innerHTML = html;

document.getElementById("result").innerHTML = "";
document.getElementById("explain").innerHTML = "";

}

function answer(i){

let q = questions[index];

let buttons = document.querySelectorAll(".btn");

buttons.forEach((b,idx)=>{
if(idx === q.a) b.classList.add("correct");
if(idx === i && i !== q.a) b.classList.add("wrong");
});

if(i === q.a){

document.getElementById("result").innerHTML =
"⭕ 正解 +2P";

point += 2;
localStorage.setItem("point",point);

localStorage.setItem("mathCorrect",
(Number(localStorage.getItem("mathCorrect"))||0)+1);

}else{

document.getElementById("result").innerHTML =
"❌ 不正解";
}

localStorage.setItem("mathAnswered",
(Number(localStorage.getItem("mathAnswered"))||0)+1);

document.getElementById("explain").innerText =
questions[index].ex;

}

function next(){

index++;

if(index >= questions.length){
alert("終了！");
location.href="index.html";
return;
}

show();
}

</script>

</body>
</html>
