<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学習設定</title>
    <style>
        body { font-family: sans-serif; padding: 20px; box-sizing: border-box; }
        .setup-area, .quiz-area { background: white; padding: 20px; border-radius: 10px; border: 1px solid #ddd; }
        select, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; font-size: 1rem; }
        .choice-btn { background: white; border: 2px solid #2563eb; cursor: pointer; }
    </style>
</head>
<body>
    <div id="setup-area" class="setup-area">
        <h3>学習設定</h3>
        学年: <select id="grade-sel">
            <option value="1">中1</option><option value="2">中2</option><option value="3">中3</option>
        </select>
        問題数: <select id="count-sel">
            <option value="5">5問</option><option value="10">10問</option><option value="20">20問</option>
        </select>
        <button onclick="startQuiz()" style="background:#2563eb; color:white;">開始</button>
    </div>

    <div id="quiz-area" class="quiz-area" style="display:none;">
        <div id="q-text" style="font-size:1.2rem; margin-bottom:20px;"></div>
        <div id="choices-area"></div>
    </div>

    <div id="end-area" style="display:none;">
        <p>終了しました！</p>
        <a href="index.html">ホームに戻る</a>
    </div>

    <script>
        // データの定義（math.htmlかsocial.htmlかで書き換える）
        const db = {
            '1': [{q: "1年：問題文1", choices: ["A", "B", "C", "D", "E"], correct: "A"}],
            '2': [{q: "2年：問題文1", choices: ["A", "B", "C", "D", "E"], correct: "A"}],
            '3': [{q: "3年：問題文1", choices: ["A", "B", "C", "D", "E"], correct: "A"}]
        };

        let currentCount = 0;
        let targetCount = 0;
        let currentGrade = 0;

        function startQuiz() {
            targetCount = parseInt(document.getElementById('count-sel').value);
            currentGrade = document.getElementById('grade-sel').value;
            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('quiz-area').style.display = 'block';
            showQ();
        }

        function showQ() {
            if(currentCount >= targetCount) {
                document.getElementById('quiz-area').style.display = 'none';
                document.getElementById('end-area').style.display = 'block';
                return;
            }
            const q = db[currentGrade][Math.floor(Math.random()*db[currentGrade].length)];
            document.getElementById('q-text').innerText = q.q;
            const area = document.getElementById('choices-area'); area.innerHTML = '';
            q.choices.forEach(c => {
                const b = document.createElement('button'); b.className = 'choice-btn'; b.innerText = c;
                b.onclick = () => { 
                    if(c === q.correct) { localStorage.setItem('totalPoints', parseInt(localStorage.getItem('totalPoints')||0)+2); } 
                    localStorage.setItem('totalAnswers', parseInt(localStorage.getItem('totalAnswers')||0)+1); 
                    currentCount++; showQ(); 
                };
                area.appendChild(b);
            });
        }
    </script>
</body>
</html>
