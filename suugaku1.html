<script>
    const mathQuestions = [
        { subject: "数学", grade: 1, q: "正の整数のことを、別名で何というか？", choices: ["自然数", "絶対値", "有限数", "素数"], a: "自然数", hint: "物の個数を1, 2, 3...と数える自然な数なので「自然数」です。「0」や負の数は含みません。" },
        { subject: "数学", grade: 1, q: "0は「自然数」に含まれる？含まれない？", choices: ["含まれる", "含まれない", "問題によって変わる", "小数に含まれる"], a: "含まれない", hint: "自然数は「正の整数」のみ。0は正でも負でもない特別な数なので、含まれません。テスト頻出！" },
        { subject: "数学", grade: 1, q: "数直線上で、ある数に対応する点と「原点」との距離のことを何というか？", choices: ["符号", "絶対値", "項", "係数"], a: "絶対値", hint: "原点(0)からの「純粋な距離」のこと。距離にマイナスはないので、絶対値は必ずプラスか0になります。" },
        { subject: "数学", grade: 1, q: "「絶対値が5以下になる整数」は全部で何個あるか？", choices: ["5個", "10個", "11個", "9個"], a: "11個", hint: "プラス側（1〜5の5個）、マイナス側（-1〜-5の5個）、そして「0」の1個。合わせて 5 + 5 + 1 = 11個です。0を忘れる罠！" },
        { subject: "数学", grade: 1, q: "「絶対値が3より小さい整数」をすべて足し合わせると、答えはいくつになるか？", choices: ["6", "-6", "0", "3"], a: "0", hint: "該当するのは -2, -1, 0, 1, 2。これらをすべて足すと、プラスとマイナスが綺麗に打ち消し合って「0」になります。" },
        { subject: "数学", grade: 1, q: "現在の気温から「-4℃低い」とは、通常の表現に直すとどういうことか？", choices: ["4℃低い", "4℃高い", "マイナス4℃のまま", "変化なし"], a: "4℃高い", hint: "「負の数で低い」は逆の逆となり、「プラス4℃高い」という意味になります。日本語のひっかけ対策に。" },
        { subject: "数学", grade: 1, q: "数直線上で、-3 から右に 7 だけ進んだ位置にある数は何か？", choices: ["-10", "4", "-4", "10"], a: "4", hint: "式に直すと：-3 + 7 = 4。借金が3円ある状態から、7円もらったと考えましょう。" },
        { subject: "数学", grade: 1, q: "数直線上で、2 から左に 6 だけ進んだ位置にある数は何か？", choices: ["-4", "4", "-8", "8"], a: "-4", hint: "式に直すと：2 - 6 = -4。2円しか持っていないのに6円使うと、4円の赤字（マイナス）になります。" },
        { subject: "数学", grade: 1, q: "2数 a, b があり、a > 0, b < 0 である。このとき、2数の積 a × b の符号は必ずどうなるか？", choices: ["必ず正", "必ず負", "0になる", "場合による"], a: "必ず負", hint: "（プラス）×（マイナス）の計算です。異符号同士のかけ算の答えは、必ず「負（マイナス）」になります。" },
        { subject: "数学", grade: 1, q: "2数 a, b がどちらも負の数（a < 0, b < 0）のとき、a + b の符号は必ずどうなるか？", choices: ["必ず正", "必ず負", "0になる", "プラスになることもある"], a: "必ず負", hint: "マイナスの数に、さらにマイナスの数を足し算（借金の重ねがけ）するので、答えは必ずさらに深い「負（マイナス）」になります。" },
        { subject: "数学", grade: 1, q: "計算しなさい：\n(-12) + (-8)", choices: ["-4", "-20", "20", "4"], a: "-20", hint: "-12にさらに-8を合わせるので、同じ符号のまま数字を足します。12 + 8 = 20 にマイナスをつけて -20。" },
        { subject: "数学", grade: 1, q: "計算しなさい：\n(-7) - (-15)", choices: ["-22", "8", "-8", "22"], a: "8", hint: "マイナスを引くときは、符号がプラスに化けます！\n式：-7 + 15 = 8" },
        { subject: "数学", grade: 1, q: "計算しなさい：\n-5 - 8", choices: ["-13", "3", "-3", "13"], a: "-13", hint: "「-5 から 8 を引く」ので、さらにマイナス方向へ進みます。式：-5 + (-8) = -13 です。符号間違いに注意。" },
        { subject: "数学", grade: 1, q: "計算しなさい：\n(-3) × (-4) × (-2)", choices: ["24", "-24", "12", "-12"], a: "-24", hint: "かけ算のマイナスの個数を数えましょう。3個（奇数個）あるので答えの符号は「マイナス」。あとは数字をかけます。3×4×2=24 なので -24。" },
        { subject: "数学", grade: 1, q: "計算しなさい：\n-3²", choices: ["9", "-9", "6", "-6"], a: "-9", hint: "超重要！カッコがないので、マイナスはそのままにして「3だけを2回」かけます。\n式：-(3 × 3) = -9" },
        { subject: "数学", grade: 1, q: "計算しなさい：\n(-3)²", choices: ["9", "-9", "6", "-6"], a: "9", hint: "今度はカッコがついているので、「-3を丸ごと2回」かけ算します。\n式：(-3) × (-3) = 9（マイナス×マイナスでプラス）。" },
        { subject: "数学", grade: 1, q: "計算しなさい：\n-2⁴", choices: ["16", "-16", "8", "-8"], a: "-16", hint: "カッコがないため、4乗されるのは2だけ。マイナスは最後にポツンと残ります。\n式：-(2×2×2×2) = -16。" },
        { subject: "数学", grade: 1, q: "計算しなさい：\n(-1)⁵⁰", choices: ["1", "-1", "50", "-50"], a: "1", hint: "カッコつきの-1を50回（偶数回）かけています。マイナスが偶数個集まると符号はプラスになるため、答えは「1」です。" },
        { subject: "数学", grade: 1, q: "計算しなさい：\n(-1)⁵³", choices: ["1", "-1", "53", "-53"], a: "-1", hint: "カッコつきの-1を53回（奇数回）かけています。マイナスが奇数個なので、全体の符号は「マイナス」となり、答えは「-1」です。" },
        { subject: "数学", grade: 1, q: "計算しなさい：\n(-2)³ × (-1)⁴", choices: ["8", "-8", "6", "-6"], a: "-8", hint: "まず累乗をバラします。\n(-2)³ = -8\n(-1)⁴ = 1\n式：(-8) × 1 = -8 となります。" },
        { subject: "数学", grade: 1, q: "計算しなさい（順序に注意）：\n7 + (-3) × 4", choices: ["16", "-5", "5", "-16"], a: "-5", hint: "足し算よりも「かけ算が先」です！\n式：7 + (-12) = -5。左から 7-3=4 にしては絶対にダメ！" },
        { subject: "数学", grade: 1, q: "計算しなさい（順序に注意）：\n16 - 8 ÷ (-2)", choices: ["-4", "12", "20", "4"], a: "20", hint: "後ろの割り算が先。`-8 ÷ (-2)` をひしかたまりと見ると `+4` になります。\n式：16 + 4 = 20。" },
        { subject: "数学", grade: 1, q: "計算しなさい：\n6 × (-2) - (-15) ÷ 3", choices: ["-7", "-17", "7", "-9"], a: "-7", hint: "前半のかけ算と、後半の割り算をそれぞれ先に行います。\n前半：6 × (-2) = -12\n後半：(-15) ÷ 3 = -5\n式：-12 - (-5) = -12 + 5 = -7。" },
        { subject: "数学", grade: 1, q: "計算しなさい：\n5 - 3 × ( -2 )²", choices: ["8", "-7", "7", "4"], a: "-7", hint: "「累乗」が最優先、次に「かけ算」、最後に「引き算」です。\n1番目：(-2)² = 4\n2番目：3 × 4 = 12\n3番目：5 - 12 = -7。" },
        { subject: "数学", grade: 1, q: "{ 4 - (-6) } ÷ (-2)", choices: ["-1", "-5", "5", "1"], a: "-5", hint: "中カッコ { } の中を一番最初に計算します。\nカッコ内：4 + 6 = 10\n全体式：10 ÷ (-2) = -5。" },
        { subject: "数学", grade: 1, q: "「-0.7」の逆数はどれか？", choices: ["0.7", "-7/10", "-10/7", "10/7"], a: "-10/7", hint: "-0.7 をまず分数に直すと「-7/10」です。逆数は分母と分子をひっくり返したものなので、符号そのままで「-10/7」になります。" },
        { subject: "数学", grade: 1, q: "計算しなさい：\n2/3 - 4/5", choices: ["-2/2", "-2/15", "2/15", "-2/5"], a: "-2/15", hint: "分母を15に通分します。\n式：10/15 - 12/15 = -2/15。小さい数から大きい数を引くのでマイナス！" },
        { subject: "数学", grade: 1, q: "計算しなさい：\n(-9) ÷ 5/2", choices: ["-45/2", "-18/5", "18/5", "-5/18"], a: "-18/5", hint: "分数の割り算は「かける逆数」にします。\n式：(-9) × 2/5 = -18/5。" },
        { subject: "数学", grade: 1, q: "計算しなさい：\n3/4 ÷ (-6/7)", choices: ["-9/14", "-7/8", "7/8", "-24/21"], a: "-7/8", hint: "逆数のかけ算に直して、途中でしっかり約分します。\n式：3/4 × (-7/6) = (3×-7)/(4×6) = -7/8。" },
        { subject: "数学", grade: 1, q: "分配法則を使って計算しなさい：\n( 1/2 - 1/3 ) × 12", choices: ["1", "2", "-2", "5"], a: "2", hint: "カッコ内を通分するより、12を両方に配る（かける）方が圧倒的に早いです！\n式：1/2×12 - 1/3×12 = 6 - 4 = 2。" },
        { subject: "数学", grade: 1, q: "分配法則の逆を利用して計算しなさい：\n74 × (-9) + 26 × (-9)", choices: ["-90", "-900", "900", "-100"], a: "-900", hint: "共通している「×(-9)」を外に出して、残りを先に足します。\n式：(74 + 26) × (-9) = 100 × (-9) = -900。計算ミスの確率を下げるプロの技。" },
        { subject: "数学", grade: 1, q: "次の計算で使われている法則は何か？\n3 × (-5) ＝ (-5) × 3", choices: ["交換法則", "結合法則", "分配法則", "消去法則"], a: "交換法則", hint: "前後を入れ「交換」しても答えが変わらない、これが交換法則です。たし算・かけ算で使えます。" },
        { subject: "数学", grade: 1, q: "次の計算で使われている法則は何か？\n(5 × 2) × 7 ＝ 5 × (2 × 7)", choices: ["交換法則", "結合法則", "分配法則", "結合の逆"], a: "結合法則", hint: "計算するグループ（組み合わせ）を変えて「結合」させても答えが同じになる、これが結合法則です。" },
        { subject: "数学", grade: 1, q: "「a - b ＝ b - a」 のように、引き算では交換法則は成り立つか？", choices: ["いつでも成り立つ", "成り立たない", "aとbが0の時だけ成り立つ", "分数なら成り立つ"], a: "成り立たない", hint: "例えば 5 - 3 = 2 ですが、入れ替えると 3 - 5 = -2 になり、答えが変わってしまいます。引き算・割り算に交換法則はありません！" },
        { subject: "数学", grade: 1, q: "計算しなさい：\n(-2)³ ÷ 4/3 × (-1/2)", choices: ["3", "-3", "1", "-1"], a: "3", hint: "まずは累乗：(-2)³ = -8\n次に割り算を逆数に：-8 × 3/4 × (-1/2)\n全体でマイナスが2個あるので符号はプラス。約分すると：2 × 3 × 1/2 = 3。" },
        { subject: "数学", grade: 1, q: "文字式のルールに従って表しなさい：\na × 3 × b", choices: ["ab3", "3ab", "3ba", "a3b"], a: "3ab", hint: "ルール：①数字が絶対先頭、②文字はアルファベット順（a → b）に並べる。よって「3ab」です。" },
        { subject: "数学", grade: 1, q: "文字式のルールに従って表しなさい：\nx × (-1) × y", choices: ["-1xy", "-xy", "xy-1", "-x1y"], a: "-xy", hint: "文字式の最重要ルール：数字の「1」は完全に省略します！マイナス符号だけ残して「-xy」が正解。" },
        { subject: "数学", grade: 1, q: "文字式のルールに従って表しなさい：\nx × x × y × 5", choices: ["5x²y", "5xy²", "x²y5", "5x2y"], a: "5x²y", hint: "数字を先頭にし、同じ文字のかけ算は「累乗（二乗など）」の形にまとめます。よって 5x²y 。" },
        { subject: "数学", grade: 1, q: "文字式のルールに従って表しなさい：\n(a - b) ÷ 5", choices: ["5/(a-b)", "(a-b)/5", "a-b/5", "5a-5b"], a: "(a-b)/5", hint: "割り算は記号を使わず分数で表します。カッコがついた多項式は丸ごと分子に乗せ、カッコを外します。よって (a-b)/5 。" },
        { subject: "数学", grade: 1, q: "x ＝ -4 のとき、代数式 -3x の値を求めなさい。", choices: ["-12", "12", "-7", "7"], a: "12", hint: "-3x とは `-3 × x` のこと。ここに -4 を代入します。\n式：(-3) × (-4) = 12（マイナス同士でプラス）。" },
        { subject: "数学", grade: 1, q: "a ＝ -2 のとき、式の値「a²」を求めなさい。", choices: ["-4", "4", "-2", "2"], a: "4", hint: "負の数を代入して二乗するときは、カッコをつけた状態にして計算します。\n式：(-2)² = (-2) × (-2) = 4。" },
        { subject: "数学", grade: 1, q: "a ＝ -3 のとき、式の値「-a²」を求めなさい。", choices: ["9", "-9", "6", "-6"], a: "-9", hint: "テスト作成者が最も喜ぶひっかけ問題。マイナスはそのままに、aの二乗だけを先に処理します。\n式：- ( (-3)² ) = - (9) = -9。" },
        { subject: "数学", grade: 1, q: "x ＝ 2, y ＝ -3 のとき、式の値「3x + 2y」を求めなさい。", choices: ["12", "0", "1", "-0"], a: "0", hint: "それぞれに数字を代入して掛け算します。\n式：3×2 + 2×(-3) = 6 + (-6) = 0。" },
        { subject: "数学", grade: 1, q: "文字式 4x の「4」のように、文字の前ついている数字の係数を何というか？", choices: ["項", "係数", "次数", "定数"], a: "係数", hint: "文字にかかっている数字の塊を「係数（けいすう）」と言います。ちなみに -x の係数は「-1」です。" },
        { subject: "数学", grade: 1, q: "式 5x - 3y において、符号で区切られた「5x」や「-3y」の要素を何というか？", choices: ["項", "係数", "次数", "定数"], a: "項", hint: "足し算・引き算の符号の前で区切った、式の1つひとつのパーツのことを「項（こう）」と呼びます。" },
        { subject: "数学", grade: 1, q: "計算しなさい：\n3x - 7x", choices: ["-4", "-4x", "4x", "-10x"], a: "-4x", hint: "同じ文字の項は、係数（数字）同士を普通に計算して文字をくっつけます。\n式：(3 - 7)x = -4x。" },
        { subject: "数学", grade: 1, q: "計算しなさい：\n4x - 3 - 7x + 8", choices: ["-3x + 5", "3x + 5", "-3x - 5", "11x + 5"], a: "-3x + 5", hint: "文字の項（4x と -7x）と、ただの数字の項（-3 と +8）を完全に分けて計算します。\n4x-7x = -3x\n-3+8 = 5\nよって -3x + 5。" },
        { subject: "数学", grade: 1, q: "計算しなさい：\n(3x - 5) - (x - 2)", choices: ["2x - 7", "2x - 3", "4x - 7", "2x + 3"], a: "2x - 3", hint: "引き算のカッコを開けるときは、後ろのカッコ内のすべての符号が逆転します！\n式：3x - 5 - x + 2 = 2x - 3。超重要！" },
        { subject: "数学", grade: 1, q: "計算しなさい：\n-4(2x - 3)", choices: ["-8x - 12", "-8x + 12", "-8x - 3", "-8x + 3"], a: "-8x + 12", hint: "分配法則で、-4 をカッコの中の「両方」に掛け算します。後ろの項のマイナス符号の反転に注意！\n式：-4×2x + (-4)×(-3) = -8x + 12。" },
        { subject: "数学", grade: 1, q: "計算しなさい：\n(15x - 10) ÷ 5", choices: ["3x - 2", "3x - 10", "15x - 2", "3x + 2"], a: "3x - 2", hint: "割り算も分配法則と同じです。15x と -10 の「両方」を 5 で割り算します。\n式：15x÷5 + (-10)÷5 = 3x - 2。" }
    ];
</script>
