<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数学 - 一問一答クイズ</title>
    <style>
        :root {
            --bg-color: #f1f5f9;
            --text-color: #0f172a;
            --accent-color: #3b82f6;
            --accent-hover: #1d4ed8;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        nav {
            width: 100%; background: var(--card-bg); border-bottom: 1px solid var(--border-color);
            padding: 1.2rem 2rem; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center;
        }
        nav a { color: #64748b; text-decoration: none; font-size: 0.95rem; font-weight: 600; }
        nav a.nav-logo { color: var(--text-color); font-size: 1.2rem; font-weight: 800; }
        header { width: 100%; text-align: center; padding: 3rem 1rem 1.5rem 1rem; }
        h1 { font-size: 2.2rem; font-weight: 800; margin: 0; color: var(--text-color); }
        .container { width: 100%; max-width: 540px; padding: 0 1.5rem; box-sizing: border-box; }
        
        .card {
            background: var(--card-bg); border-radius: 20px; padding: 3rem 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); text-align: center; display: none;
        }
        .card.active { display: block; animation: fadeIn 0.35s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        h2 { font-size: 1.30rem; margin-top: 0; margin-bottom: 2.5rem; color: #334155; font-weight: 700; }
        .btn-list { display: flex; flex-direction: column; gap: 1rem; }
        
        .btn {
            background-color: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-color);
            padding: 1.1rem 2rem; font-size: 1.1rem; font-weight: 600; border-radius: 14px; cursor: pointer; transition: all 0.2s ease;
            text-align: left;
        }
        .btn:hover:not(:disabled) { border-color: var(--accent-color); background-color: rgba(59, 130, 246, 0.02); transform: translateY(-1px); }
        
        /* 4択クイズの正誤演出用のスタイル */
        .btn.correct { background-color: var(--success-color) !important; color: white !important; border-color: var(--success-color) !important; }
        .btn.wrong { background-color: var(--danger-color) !important; color: white !important; border-color: var(--danger-color) !important; }
        
        .btn-primary { background-color: var(--accent-color); color: white; border: none; text-align: center; }
        .btn-primary:hover { background-color: var(--accent-hover); }
        
        .quiz-text { font-size: 1.4rem; font-weight: 700; margin-bottom: 2.5rem; min-height: 80px; display: flex; align-items: center; justify-content: center; color: #0f172a; }
        .progress { font-size: 0.95rem; font-weight: 700; color: #94a3b8; margin-bottom: 1.5rem; letter-spacing: 0.05em; }
        .score-display { font-size: 4rem; font-weight: 800; color: var(--accent-color); margin: 1.5rem 0; }
        
        #next-btn-box { display: none; margin-top: 2rem; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo">一問一答勉強サイト</a>
        <div><a href="index.html">← トップに戻る</a></div>
    </nav>

    <header>
        <h1>数学 4択クイズ</h1>
    </header>

    <div class="container">
        <div id="step-grade" class="card active">
            <h2>学年を選択してください</h2>
            <div class="btn-list">
                <button class="btn" style="text-align:center;" onclick="selectGrade(1)">中学1年</button>
                <button class="btn" style="text-align:center;" onclick="selectGrade(2)">中学2年</button>
                <button class="btn" style="text-align:center;" onclick="selectGrade(3)">中学3年</button>
            </div>
        </div>

        <div id="step-count" class="card">
            <h2>解く問題数を選択してください</h2>
            <div class="btn-list">
                <button class="btn" style="text-align:center;" onclick="startQuiz(5)">5問</button>
                <button class="btn" style="text-align:center;" onclick="startQuiz(10)">10問</button>
                <button class="btn" style="text-align:center;" onclick="startQuiz(20)">20問</button>
            </div>
        </div>

        <div id="step-quiz" class="card">
            <div class="progress" id="quiz-progress">第 1 問 / 全 5 問</div>
            <div class="quiz-text" id="quiz-question">問題文</div>
            
            <div class="btn-list" id="choices-box"></div>
            
            <div id="next-btn-box">
                <button class="btn btn-primary" style="width:100%;" onclick="nextQuestion()">次の問題へ</button>
            </div>
        </div>

        <div id="step-result" class="card">
            <h2>結果発表</h2>
            <p id="result-summary" style="font-size: 1.1rem; color: #64748b; margin: 0;">解いた問題数：5問</p>
            <div class="score-display"><span id="correct-count">0</span> / <span id="total-count">5</span></div>
            <div class="btn-list">
                <a href="index.html" class="btn btn-primary">ホームに戻って実績を確認</a>
            </div>
        </div>
    </div>

    <script>
        // --- 4択に対応した数学問題データベース ---
        const quizDatabase = {
            1: [
                { 
                    q: "xの係数が1のとき、1xの「1」はどう表すのが正しい？", 
                    choices: ["1xと書く", "書かない（xと書く）", "書かずに空白にする", "x1と書く"],
                    a: "書かない（xと書く）" 
                },
                { 
                    q: "yはxに比例し、x=2のときy=6である。比例定数 a を求める正しい式は？", 
                    choices: ["2 = 6a", "6 = 2a", "a = 2 × 6", "6 = a / 2"],
                    a: "6 = 2a" 
                }
            ],
            2: [
                { 
                    q: "連立方程式を解く2つの代表的な方法は？「代入法」と何法？", 
                    choices: ["加減法", "乗除法", "因数分解法", "比例法"],
                    a: "加減法" 
                }
            ],
            3: [
                { 
                    q: "二次方程式 ax² + bx + c = 0 の「解の公式」の分子のルートの中身は？", 
                    choices: ["b² - 4ac", "b² + 4ac", "4ac - b²", "2a - 4bc"],
                    a: "b² - 4ac" 
                }
            ]
        };

        let selectedGrade = '';
        let currentQuestions = [];
        let currentIndex = 0;
        let correctAnswers = 0;
        let hasAnswered = false; // 二重クリック防止フラグ

        function changeView(stepId) {
            document.querySelectorAll('.card').forEach(card => card.classList.remove('active'));
            document.getElementById(stepId).classList.add('active');
        }

        function selectGrade(grade) {
            selectedGrade = grade;
            changeView('step-count');
        }

        function startQuiz(count) {
            const rawQuestions = quizDatabase[selectedGrade] || [];
            if (rawQuestions.length === 0) {
                alert("問題がまだ登録されていません。");
                window.location.href = 'index.html';
                return;
            }
            const shuffled = [...rawQuestions].sort(() => 0.5 - Math.random());
            currentQuestions = shuffled.slice(0, Math.min(count, shuffled.length));
            currentIndex = 0;
            correctAnswers = 0;
            changeView('step-quiz');
            showQuestion();
        }

        function showQuestion() {
            hasAnswered = false;
            const current = currentQuestions[currentIndex];
            document.getElementById('quiz-progress').innerText = `第 ${currentIndex + 1} 問 / 全 ${currentQuestions.length} 問`;
            document.getElementById('quiz-question').innerText = current.q;
            
            // 次へボタンを隠す
            document.getElementById('next-btn-box').style.display = 'none';

            // 選択肢のシャッフル（毎回ボタンの位置を変える）
            const shuffledChoices = [...current.choices].sort(() => 0.5 - Math.random());
            
            // 選択肢ボタンの動的生成
            const choicesBox = document.getElementById('choices-box');
            choicesBox.innerHTML = ''; // クリア
            
            shuffledChoices.forEach(choice => {
                const button = document.createElement('button');
                button.className = 'btn';
                button.innerText = choice;
                button.onclick = () => checkAnswer(button, choice, current.a);
                choicesBox.appendChild(button);
            });
        }

        // 正誤判定処理
        function checkAnswer(selectedButton, selectedChoice, correctAnswer) {
            if (hasAnswered) return; // すでに回答済みなら処理しない
            hasAnswered = true;

            const choicesBox = document.getElementById('choices-box');
            const buttons = choicesBox.getElementsByClassName('btn');

            // すべてのボタンを選択不可にする
            for (let btn of buttons) {
                btn.disabled = true;
                // 正解のボタンは、選んでいなくても緑にする（どこが正解か教えるため）
                if (btn.innerText === correctAnswer) {
                    btn.classList.add('correct');
                }
            }

            if (selectedChoice === correctAnswer) {
                correctAnswers++;
            } else {
                // 間違っていた場合、選んだボタンを赤にする
                selectedButton.classList.add('wrong');
            }

            // 「次の問題へ」ボタンを表示
            document.getElementById('next-btn-box').style.display = 'block';
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < currentQuestions.length) {
                showQuestion();
            } else {
                saveStats(currentQuestions.length, correctAnswers);
                document.getElementById('result-summary').innerText = `解いた問題数：${currentQuestions.length}問`;
                document.getElementById('correct-count').innerText = correctAnswers;
                document.getElementById('total-count').innerText = currentQuestions.length;
                changeView('step-result');
            }
        }

        function saveStats(solvedCount, correctCount) {
            let currentTotal = parseInt(localStorage.getItem('totalSolved') || 0);
            localStorage.setItem('totalSolved', currentTotal + solvedCount);

            let accuracy = Math.round((correctCount / solvedCount) * 100);
            let currentBest = parseInt(localStorage.getItem('bestAccuracy') || 0);
            if (accuracy > currentBest) {
                localStorage.setItem('bestAccuracy', accuracy);
            }
        }
    </script>
</body>
</html>
