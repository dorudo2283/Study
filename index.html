<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一問一答勉強サイト</title>
    <style>
        /* --- CSS: スタイリッシュで信頼感のあるモダンミニマル --- */
        :root {
            --bg-color: #f5f7fa;
            --text-color: #1e293b;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            text-align: center;
            padding: 4rem 1rem 2rem 1rem;
            box-sizing: border-box;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin: 0;
            background: linear-gradient(135deg, #1e293b 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 540px;
            padding: 0 1.5rem;
            box-sizing: border-box;
            margin-bottom: 4rem;
        }

        /* カードの立体感とアニメーションを強化 */
        .view-step {
            display: none;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 3rem 2rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .view-step.active {
            display: block;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 2.5rem;
            color: #475569;
            font-weight: 600;
        }

        /* ボタンデザインの洗練化 */
        .btn-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 1.1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .btn:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
            background-color: rgba(59, 130, 246, 0.04);
            transform: translateY(-1px);
        }

        /* アクション用の主ボタン */
        .btn-primary {
            background-color: var(--accent-color);
            color: white;
            border: none;
        }
        .btn-primary:hover {
            background-color: var(--accent-hover);
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.25);
        }

        /* 正誤判定ボタンの横並び用 */
        .judge-box {
            display: none;
            gap: 1rem;
        }
        .judge-box.visible {
            display: flex;
        }
        .btn-success { background-color: var(--success-color); color: white; border: none; flex: 1; }
        .btn-danger { background-color: var(--danger-color); color: white; border: none; flex: 1; }

        /* クイズ画面 */
        .quiz-text {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 2.5rem;
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0f172a;
        }

        .answer-box {
            background: #f8fafc;
            border: 1px dashed #cbd5e1;
            padding: 1.5rem;
            border-radius: 12px;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 2.5rem;
            display: none;
        }

        .answer-box.visible {
            display: block;
            animation: pulse 0.3s ease;
        }

        @keyframes pulse {
            0% { transform: scale(0.98); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .progress {
            font-size: 0.95rem;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 1.5rem;
            letter-spacing: 0.05em;
        }

        /* 結果発表のスコア表示 */
        .score-display {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--accent-color);
            margin: 1.5rem 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>一問一答勉強サイト</h1>
    </header>

    <div class="container">
        <div id="step-subject" class="view-step active">
            <h2>教科を選択してください</h2>
            <div class="btn-list">
                <button class="btn" onclick="selectSubject('math')">数学</button>
                <button class="btn" onclick="selectSubject('social')">社会</button>
            </div>
        </div>

        <div id="step-grade" class="view-step">
            <h2>学年を選択してください</h2>
            <div class="btn-list">
                <button class="btn" onclick="selectGrade(1)">中学1年</button>
                <button class="btn" onclick="selectGrade(2)">中学2年</button>
                <button class="btn" onclick="selectGrade(3)">中学3年</button>
            </div>
        </div>

        <div id="step-count" class="view-step">
            <h2>解く問題数を選択してください</h2>
            <div class="btn-list">
                <button class="btn" onclick="startQuiz(5)">5問</button>
                <button class="btn" onclick="startQuiz(10)">10問</button>
                <button class="btn" onclick="startQuiz(20)">20問</button>
            </div>
        </div>

        <div id="step-quiz" class="view-step">
            <div class="progress" id="quiz-progress">1 / 5</div>
            <div class="quiz-text" id="quiz-question">問題文</div>
            <div class="answer-box" id="quiz-answer">正解データ</div>
            
            <div class="btn-list">
                <button class="btn btn-primary" id="action-btn" onclick="showAnswer()">答えを見る</button>
                
                <div class="judge-box" id="judge-box">
                    <button class="btn btn-danger" onclick="submitJudgment(false)">おぼえてない</button>
                    <button class="btn btn-success" onclick="submitJudgment(true)">おぼえてた！</button>
                </div>
            </div>
        </div>

        <div id="step-result" class="view-step">
            <h2>結果発表</h2>
            <p id="result-summary" style="font-size: 1.1rem; color: #64748b; margin: 0;">解いた問題数：5問</p>
            <div class="score-display"><span id="correct-count">0</span> / <span id="total-count">5</span></div>
            <p style="color: #64748b; margin-bottom: 2.5rem;">この調子で基礎を固めていきましょう！</p>
            <div class="btn-list">
                <button class="btn btn-primary" onclick="resetQuiz()">もう一度解く</button>
            </div>
        </div>
    </div>

    <script>
        // --- クイズデータ ---
        const quizDatabase = {
            math: {
                1: [
                    { q: "xの係数が1のとき、1xの「1」は書く？書かない？", a: "書かない（xと書く）" },
                    { q: "yはxに比例し、x=2のときy=6である。比例定数を求める式は？", a: "6 = 2a" }
                ],
                2: [
                    { q: "連立方程式を解く2つの代表的な方法は？「代入法」と何法？", a: "加減法" }
                ],
                3: [
                    { q: "二次方程式 ax² + bx + c = 0 の解の公式、x = ？", a: "(-b ± √(b² - 4ac)) / 2a" }
                ]
            },
            social: {
                1: [
                    { q: "三大宗教のうち、信者数が最も多い宗教は？", a: "キリスト教" }
                ],
                2: [
                    { q: "1573年、織田信長によって滅ぼされた幕府は？", a: "室町幕府" },
                    { q: "江戸時代、五街道の起点となった江戸の橋は？", a: "日本橋" }
                ],
                3: [
                    { q: "日本国憲法の三大原則は「国民主権」「基本的人権の尊重」と何？", a: "平和主義" }
                ]
            }
        };

        // --- 状態管理 ---
        let selectedSubject = '';
        let selectedGrade = '';
        let currentQuestions = [];
        let currentIndex = 0;
        let correctAnswers = 0; // 正解数をカウントする変数

        function changeView(stepId) {
            document.querySelectorAll('.view-step').forEach(view => view.classList.remove('active'));
            document.getElementById(stepId).classList.add('active');
        }

        function selectSubject(subject) {
            selectedSubject = subject;
            changeView('step-grade');
        }

        function selectGrade(grade) {
            selectedGrade = grade;
            changeView('step-count');
        }

        // クイズ開始
        function startQuiz(count) {
            const rawQuestions = quizDatabase[selectedSubject]?.[selectedGrade] || [];
            
            if (rawQuestions.length === 0) {
                alert("該当する問題がまだ登録されていません。");
                resetQuiz();
                return;
            }

            const shuffled = [...rawQuestions].sort(() => 0.5 - Math.random());
            // 選んだ問題数か、存在する最大問題数の少ない方をセット
            currentQuestions = shuffled.slice(0, Math.min(count, shuffled.length));
            
            currentIndex = 0;
            correctAnswers = 0; // リセット
            
            changeView('step-quiz');
            showQuestion();
        }

        // 問題表示
        function showQuestion() {
            const current = currentQuestions[currentIndex];
            document.getElementById('quiz-progress').innerText = `第 ${currentIndex + 1} 問 / 全 ${currentQuestions.length} 問`;
            document.getElementById('quiz-question').innerText = current.q;
            
            const answerBox = document.getElementById('quiz-answer');
            answerBox.innerText = current.a;
            answerBox.classList.remove('visible');
            
            // ボタンの表示切り替え
            document.getElementById('action-btn').style.display = 'block';
            document.getElementById('judge-box').classList.remove('visible');
        }

        // 答えを表示
        function showAnswer() {
            document.getElementById('quiz-answer').classList.add('visible');
            document.getElementById('action-btn').style.display = 'none';
            document.getElementById('judge-box').classList.add('visible');
        }

        // 正誤判定のボタンを押したときの処理
        function submitJudgment(isCorrect) {
            if (isCorrect) {
                correctAnswers++;
            }

            currentIndex++;
            if (currentIndex < currentQuestions.length) {
                showQuestion();
            } else {
                // 終了画面のデータ更新
                document.getElementById('result-summary').innerText = `解いた問題数：${currentQuestions.length}問`;
                document.getElementById('correct-count').innerText = correctAnswers;
                document.getElementById('total-count').innerText = currentQuestions.length;
                changeView('step-result');
            }
        }

        function resetQuiz() {
            selectedSubject = '';
            selectedGrade = '';
            currentQuestions = [];
            currentIndex = 0;
            correctAnswers = 0;
            changeView('step-subject');
        }
    </script>
</body>
</html>
