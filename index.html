<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一問一答 - 勉強WEBサイト</title>
    
    <script src="math.js"></script>
    <script src="social.js"></script>

    <style>
        /* あなたが気に入っていた以前のシンプルな基本スタイル */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }
        h1, h2 {
            text-align: center;
            color: #333;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            text-align: left;
            box-sizing: border-box;
        }
        .btn:hover {
            background-color: #0056b3;
        }
        .btn-center {
            text-align: center;
        }
        .quiz-info {
            display: flex;
            justify-content: space-between;
            color: #666;
            margin-bottom: 20px;
            font-weight: bold;
        }
        #q-text {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 25px;
            white-space: pre-wrap;
        }
        #feedback-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
        .correct {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .incorrect {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        #hint-text {
            margin-top: 10px;
            font-size: 14px;
            color: #555;
            line-height: 1.5;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="home-screen">
        <h1>一問一答勉強WEBサイト</h1>
        <p style="text-align: center; color: #666;">挑戦するモードを選んでください</p>
        <button class="btn btn-center" onclick="startQuiz('math')">数学（全50問）</button>
        <button class="btn btn-center" onclick="startQuiz('social')">社会（全15問）</button>
        <button class="btn btn-center" style="background-color: #28a745;" onclick="startQuiz('mix')">教科ごちゃ混ぜランダムモード</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="quiz-info">
            <span id="info-subject">科目</span>
            <span id="info-progress">0 / 0</span>
        </div>
        <div id="q-text">問題文がここに表示されます。</div>
        <div id="choices-area">
            </div>
        
        <div id="feedback-area">
            <b id="result-msg">正解！</b>
            <div id="hint-text">解説がここに表示されます。</div>
            <button class="btn btn-center" style="background-color: #6c757d; margin-top: 15px;" onclick="nextQuestion()">次の問題へ</button>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <h2>しゅうりょう！</h2>
        <p id="final-score" style="text-align: center; font-size: 20px; font-weight: bold; margin: 30px 0;">0問中 0問正解</p>
        <button class="btn btn-center" style="background-color: #ffc107; color: #333;" onclick="toHome()">ホームに戻る</button>
    </div>
</div>

<script>
    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;

    // クイズ開始処理
    function startQuiz(mode) {
        if (mode === 'math') {
            currentQuestions = [...mathQuestions];
        } else if (mode === 'social') {
            currentQuestions = [...socialQuestions];
        } else if (mode === 'mix') {
            // 数学と社会を合体させ、ランダム（ごちゃ混ぜ）にする
            currentQuestions = [...mathQuestions, ...socialQuestions];
            currentQuestions.sort(() => Math.random() - 0.5);
        }

        currentIndex = 0;
        score = 0;

        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');

        showQuestion();
    }

    // 問題表示
    function showQuestion() {
        document.getElementById('feedback-area').style.display = 'none';

        const qData = currentQuestions[currentIndex];

        document.getElementById('info-subject').innerText = `【${qData.subject}・中${qData.grade}】`;
        document.getElementById('info-progress').innerText = `${currentIndex + 1} / ${currentQuestions.length}`;
        document.getElementById('q-text').innerText = qData.q;

        const choicesArea = document.getElementById('choices-area');
        choicesArea.innerHTML = '';

        qData.choices.forEach(choice => {
            const button = document.createElement('button');
            button.className = 'btn';
            button.innerText = choice;
            button.onclick = () => checkAnswer(choice, button);
            choicesArea.appendChild(button);
        });
    }

    // 答え合わせ
    function checkAnswer(selectedChoice, clickedButton) {
        const qData = currentQuestions[currentIndex];
        const choicesArea = document.getElementById('choices-area');
        
        const buttons = choicesArea.getElementsByTagName('button');
        for (let btn of buttons) {
            btn.disabled = true;
        }

        const feedbackArea = document.getElementById('feedback-area');
        const resultMsg = document.getElementById('result-msg');
        const hintText = document.getElementById('hint-text');

        if (selectedChoice === qData.a) {
            resultMsg.innerText = "◯ 正解！";
            feedbackArea.className = "correct";
            score++;
        } else {
            resultMsg.innerText = `× 不正解... （正解: ${qData.a}）`;
            feedbackArea.className = "incorrect";
        }

        hintText.innerText = qData.hint;
        feedbackArea.style.display = 'block';
    }

    // 次の問題へ
    function nextQuestion() {
        currentIndex++;
        if (currentIndex < currentQuestions.length) {
            showQuestion();
        } else {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = `${currentQuestions.length}問中 ${score}問正解！`;
        }
    }

    // ホームに戻る
    function toHome() {
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('home-screen').classList.remove('hidden');
    }
</script>

</body>
</html>
