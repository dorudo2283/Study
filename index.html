<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一問一答勉強WEBサイト</title>
    
    <script src="suugaku1.html"></script>
    <script src="syakai1.html"></script>

    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }
        h1, h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        /* 統計情報ダッシュボードの高級化 */
        .stats-container {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .stats-section-title {
            font-size: 14px;
            color: #007bff;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stats-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 15px;
            color: #495057;
        }
        .stats-row strong {
            color: #212529;
        }
        .stats-divider {
            border-top: 1px dashed #dee2e6;
            margin: 15px 0;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            text-align: left;
            box-sizing: border-box;
        }
        .btn:hover {
            background-color: #0056b3;
        }
        .btn-center {
            text-align: center;
        }
        .quiz-info {
            display: flex;
            justify-content: space-between;
            color: #666;
            margin-bottom: 20px;
            font-weight: bold;
        }
        #q-text {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 25px;
            white-space: pre-wrap;
        }
        #feedback-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
        .correct {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .incorrect {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        #hint-text {
            margin-top: 10px;
            font-size: 14px;
            color: #555;
            line-height: 1.5;
        }
        .hidden {
            display: none !important;
        }
        .reset-link {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
        }
        .reset-link a {
            color: #dc3545;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="home-screen">
        <h1>一問一答勉強WEBサイト</h1>
        
        <div class="stats-container">
            <div class="stats-section-title">総合アチーブメント</div>
            <div class="stats-row">
                <span>現在の総ポイント:</span>
                <span id="stat-total-points"><strong>0 pt</strong></span>
            </div>
            <div class="stats-row">
                <span>総合回答数:</span>
                <span id="stat-total-answers"><strong>0 回</strong></span>
            </div>
            <div class="stats-row">
                <span>総合正答率:</span>
                <span id="stat-total-rate"><strong>0 %</strong></span>
            </div>
            
            <div class="stats-divider"></div>
            
            <div class="stats-section-title">数学（suugaku1）統計</div>
            <div class="stats-row">
                <span>正答率 (回答数):</span>
                <span id="stat-math-rate"><strong>0 % (0回)</strong></span>
            </div>
            <div class="stats-row">
                <span>最高スコア / 挑戦回数:</span>
                <span id="stat-math-best"><strong>0問 / 0回</strong></span>
            </div>
            
            <div class="stats-divider"></div>
            
            <div class="stats-section-title">社会（syakai1）統計</div>
            <div class="stats-row">
                <span>正答率 (回答数):</span>
                <span id="stat-social-rate"><strong>0 % (0回)</strong></span>
            </div>
            <div class="stats-row">
                <span>最高スコア / 挑戦回数:</span>
                <span id="stat-social-best"><strong>0問 / 0回</strong></span>
            </div>
        </div>

        <p style="text-align: center; color: #666;">挑戦する科目を選択してください</p>
        <button class="btn btn-center" onclick="startQuiz('math')">数学を確認する</button>
        <button class="btn btn-center" onclick="startQuiz('social')">社会を確認する</button>
        
        <div class="reset-link">
            <a onclick="resetAllStats()">データをリセットする</a>
        </div>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="quiz-info">
            <span id="info-subject">科目</span>
            <span id="info-progress">0 / 0</span>
        </div>
        <div id="q-text">問題文がここに表示されます。</div>
        <div id="choices-area"></div>
        
        <div id="feedback-area">
            <b id="result-msg">正解</b>
            <div id="hint-text">解説がここに表示されます。</div>
            <button class="btn btn-center" style="background-color: #6c757d; margin-top: 15px;" onclick="nextQuestion()">次の問題へ</button>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <h2>全問終了</h2>
        <p id="final-score" style="text-align: center; font-size: 20px; font-weight: bold; margin: 15px 0;">0問中 0問正解</p>
        <p id="earned-points" style="text-align: center; color: #28a745; font-size: 18px; font-weight: bold; margin-bottom: 30px;">+0 pt 獲得しました！</p>
        <button class="btn btn-center" style="background-color: #ffc107; color: #333;" onclick="toHome()">ホームに戻る</button>
    </div>
</div>

<script>
    // ローカルストレージ対応の統計データ構造
    let stats = {
        totalPoints: 0,
        mathAnswers: 0,
        mathCorrects: 0,
        mathBestScore: 0,
        mathAttempts: 0,
        socialAnswers: 0,
        socialCorrects: 0,
        socialBestScore: 0,
        socialAttempts: 0
    };

    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let currentMode = '';

    // 起動時に保存されたデータを読み込み、画面を更新
    window.onload = function() {
        loadStats();
        updateDashboard();
    };

    // データの読み込み
    function loadStats() {
        const savedStats = localStorage.getItem('study_web_stats');
        if (savedStats) {
            try {
                stats = JSON.parse(savedStats);
            } catch (e) {
                console.error("データの読み込みに失敗しました。新規作成します。");
            }
        }
    }

    // データの保存
    function saveStats() {
        localStorage.setItem('study_web_stats', JSON.stringify(stats));
    }

    // ダッシュボードの表示更新
    function updateDashboard() {
        const totalAnswers = stats.mathAnswers + stats.socialAnswers;
        const totalCorrects = stats.mathCorrects + stats.socialCorrects;
        const totalRate = totalAnswers > 0 ? Math.round((totalCorrects / totalAnswers) * 100) : 0;

        const mathRate = stats.mathAnswers > 0 ? Math.round((stats.mathCorrects / stats.mathAnswers) * 100) : 0;
        const socialRate = stats.socialAnswers > 0 ? Math.round((stats.socialCorrects / stats.socialAnswers) * 100) : 0;

        document.getElementById('stat-total-points').innerHTML = `<strong>${stats.totalPoints} pt</strong>`;
        document.getElementById('stat-total-answers').innerHTML = `<strong>${totalAnswers} 回</strong>`;
        document.getElementById('stat-total-rate').innerHTML = `<strong>${totalRate} %</strong>`;
        
        document.getElementById('stat-math-rate').innerHTML = `<strong>${mathRate} % (${stats.mathAnswers}回)</strong>`;
        document.getElementById('stat-math-best').innerHTML = `<strong>最高 ${stats.mathBestScore}問 / 完走 ${stats.mathAttempts}回</strong>`;
        
        document.getElementById('stat-social-rate').innerHTML = `<strong>${socialRate} % (${stats.socialAnswers}回)</strong>`;
        document.getElementById('stat-social-best').innerHTML = `<strong>最高 ${stats.socialBestScore}問 / 完走 ${stats.socialAttempts}回</strong>`;
    }

    // クイズ開始処理
    function startQuiz(mode) {
        currentMode = mode;
        if (mode === 'math') {
            if (typeof mathQuestions !== 'undefined') {
                currentQuestions = [...mathQuestions];
            } else {
                alert('数学のデータ（mathQuestions）が見つかりません。');
                return;
            }
        } else if (mode === 'social') {
            if (typeof socialQuestions !== 'undefined') {
                currentQuestions = [...socialQuestions];
            } else {
                alert('社会のデータ（socialQuestions）が見つかりません。');
                return;
            }
        }

        currentIndex = 0;
        score = 0;

        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');

        showQuestion();
    }

    // 問題表示
    function showQuestion() {
        document.getElementById('feedback-area').style.display = 'none';

        const qData = currentQuestions[currentIndex];

        document.getElementById('info-subject').innerText = `【${qData.subject}・中学${qData.grade}年】`;
        document.getElementById('info-progress').innerText = `${currentIndex + 1} / ${currentQuestions.length}`;
        document.getElementById('q-text').innerText = qData.q;

        const choicesArea = document.getElementById('choices-area');
        choicesArea.innerHTML = '';

        qData.choices.forEach(choice => {
            const button = document.createElement('button');
            button.className = 'btn';
            button.innerText = choice;
            button.onclick = () => checkAnswer(choice, button);
            choicesArea.appendChild(button);
        });
    }

    // 答え合わせ
    function checkAnswer(selectedChoice, clickedButton) {
        const qData = currentQuestions[currentIndex];
        const choicesArea = document.getElementById('choices-area');
        
        const buttons = choicesArea.getElementsByTagName('button');
        for (let btn of buttons) {
            btn.disabled = true;
        }

        const feedbackArea = document.getElementById('feedback-area');
        const resultMsg = document.getElementById('result-msg');
        const hintText = document.getElementById('hint-text');

        // 回答数のカウントアップ
        if (currentMode === 'math') {
            stats.mathAnswers++;
        } else if (currentMode === 'social') {
            stats.socialAnswers++;
        }

        if (selectedChoice === qData.a) {
            resultMsg.innerText = "〇 正解";
            feedbackArea.className = "correct";
            score++;
            
            stats.totalPoints += 10; // 1問につき10pt獲得

            if (currentMode === 'math') {
                stats.mathCorrects++;
            } else if (currentMode === 'social') {
                stats.socialCorrects++;
            }
        } else {
            resultMsg.innerText = `× 不正解（正解: ${qData.a}）`;
            feedbackArea.className = "incorrect";
        }

        hintText.innerText = qData.hint;
        feedbackArea.style.display = 'block';
        
        saveStats(); // 1問解くごとに自動保存
    }

    // 次の問題へ
    function nextQuestion() {
        currentIndex++;
        if (currentIndex < currentQuestions.length) {
            showQuestion();
        } else {
            // テスト終了時（完走）の処理
            if (currentMode === 'math') {
                stats.mathAttempts++;
                if (score > stats.mathBestScore) {
                    stats.mathBestScore = score;
                }
            } else if (currentMode === 'social') {
                stats.socialAttempts++;
                if (score > stats.socialBestScore) {
                    stats.socialBestScore = score;
                }
            }

            saveStats();
            updateDashboard();

            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = `${currentQuestions.length}問中 ${score}問正解`;
            document.getElementById('earned-points').innerText = `+${score * 10} pt 獲得しました！`;
        }
    }

    // ホームに戻る
    function toHome() {
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('home-screen').classList.remove('hidden');
    }

    // データリセット機能
    function resetAllStats() {
        if (confirm('これまでの学習データを完全にリセットしますか？')) {
            stats = {
                totalPoints: 0,
                mathAnswers: 0,
                mathCorrects: 0,
                mathBestScore: 0,
                mathAttempts: 0,
                socialAnswers: 0,
                socialCorrects: 0,
                socialBestScore: 0,
                socialAttempts: 0
            };
            saveStats();
            updateDashboard();
        }
    }
</script>

</body>
</html>
