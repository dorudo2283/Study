<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一問一答勉強サイト</title>
    <style>
        :root {
            --bg-color: #f5f7fa;
            --text-color: #1e293b;
            --accent-color: #3b82f6;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- ナビゲーションバー --- */
        nav {
            width: 100%;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo {
            font-weight: 800;
            color: var(--text-color);
            text-decoration: none;
            font-size: 1.1rem;
        }

        .nav-links a {
            color: #64748b;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .nav-links a:hover {
            color: var(--accent-color);
        }

        header {
            width: 100%;
            text-align: center;
            padding: 3rem 1rem 1.5rem 1rem;
            box-sizing: border-box;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(135deg, #1e293b 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 540px;
            padding: 0 1.5rem;
            box-sizing: border-box;
            margin-bottom: 4rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            text-align: center;
            margin-bottom: 1.5rem;
        }

        h2 {
            font-size: 1.3rem;
            margin-top: 0;
            margin-bottom: 2rem;
            color: #475569;
            font-weight: 600;
        }

        /* --- スコア実績ボード --- */
        .stats-grid {
            display: grid;
            grid-template-columns: 1xl 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .stat-box {
            background: #f8fafc;
            border: 1px solid var(--border-color);
            padding: 1rem;
            border-radius: 12px;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #64748b;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-color);
        }

        .btn-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 1.1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: block;
        }

        .btn:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
            background-color: rgba(59, 130, 246, 0.04);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo">一問一答勉強サイト</a>
        <div class="nav-links">
            <a href="index.html">ホーム</a>
        </div>
    </nav>

    <header>
        <h1>一問一答勉強サイト</h1>
    </header>

    <div class="container">
        <div class="card">
            <h2 style="margin-bottom: 1rem;">あなたの勉強実績</h2>
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label">総解答問題数</div>
                    <div id="total-solved" class="stat-value">0問</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">最高正解率</div>
                    <div id="best-accuracy" class="stat-value">0%</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>教科を選択してください</h2>
            <div class="btn-list">
                <a href="suugaku.html" class="btn">数学</a>
                <a href="syakai.html" class="btn">社会</a>
            </div>
        </div>
    </div>

    <script>
        // ページが読み込まれた時に、保存されているスコアを表示する
        window.onload = function() {
            const totalSolved = localStorage.getItem('totalSolved') || 0;
            const bestAccuracy = localStorage.getItem('bestAccuracy') || 0;

            document.getElementById('total-solved').innerText = totalSolved + '問';
            document.getElementById('best-accuracy').innerText = bestAccuracy + '%';
        };
    </script>
</body>
</html>
