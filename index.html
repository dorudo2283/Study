<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>一問一答勉強サイト</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Yu Gothic UI","Meiryo",sans-serif;
}

body{
    background:#f5f6f8;
    color:#222;
}

/* ===== 上バー ===== */

header{
    width:100%;
    background:white;
    padding:30px;
    box-shadow:0 4px 15px rgba(0,0,0,.08);
    text-align:center;
}

header h1{
    font-size:52px;
    font-weight:900;
    letter-spacing:2px;
}

/* ===== メイン ===== */

main{
    width:min(1100px,90%);
    margin:50px auto;
}

/* ===== カード ===== */

.card{
    background:white;
    border-radius:18px;
    padding:40px;
    box-shadow:0 8px 25px rgba(0,0,0,.08);
    text-align:center;
}

.card h2{
    font-size:38px;
    margin-bottom:15px;
}

.card p{
    color:#666;
    font-size:19px;
    margin-bottom:40px;
}

/* ===== ボタン ===== */

.start-btn{
    border:none;
    background:#111;
    color:white;
    font-size:24px;
    padding:18px 70px;
    border-radius:15px;
    cursor:pointer;
    transition:.25s;
}

.start-btn:hover{
    transform:translateY(-4px);
    background:#2f2f2f;
    box-shadow:0 12px 25px rgba(0,0,0,.18);
}

/* ===== 下の紹介 ===== */

.grid{
    margin-top:40px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:25px;
}

.box{
    background:white;
    border-radius:15px;
    padding:30px;
    text-align:center;
    box-shadow:0 6px 18px rgba(0,0,0,.08);
}

.box h3{
    margin-bottom:12px;
    font-size:24px;
}

.box p{
    color:#666;
    line-height:1.7;
}

/* ===== フッター ===== */

footer{
    text-align:center;
    color:#888;
    padding:40px;
    margin-top:60px;
}
</style>

</head>
<body>

<header>
    <h1>一問一答勉強サイト</h1>
</header>

<main>

<div class="card">

<h2>ようこそ！</h2>

<p>
ゲーム感覚で楽しく学べる、一問一答形式の勉強サイトです。<br>
社会・理科・数学・英語など、好きな教科から始めましょう。
</p>

<button class="start-btn">
勉強を始める
</button>

</div>

<div class="grid">

<div class="box">
<h3>📚 一問一答</h3>
<p>
テンポよく問題を解いて知識を定着させます。
</p>
</div>

<div class="box">
<h3>📈 学習記録</h3>
<p>
正答率や学習時間を自動で保存します。
</p>
</div>

<div class="box">
<h3>🏆 ランキング</h3>
<p>
連続正解数やレベルアップを目指そう。
</p>
</div>

</div>

</main>

<footer>

© 2026 一問一答勉強サイト

</footer>

</body>
</html>
