<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>国語 | 一問一答マスター</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Yu Gothic",sans-serif;}
body{background:#eef3f8;}
header{height:60px;background:#1e88e5;color:#fff;display:flex;justify-content:space-between;align-items:center;padding:0 20px;}
header a{color:white;text-decoration:none;font-weight:bold;}
.point{background:white;color:#1e88e5;padding:8px 15px;border-radius:10px;font-weight:bold;}
main{max-width:900px;margin:25px auto;padding:20px;}
h1{text-align:center;margin-bottom:20px;}
.menu{text-align:center;}
.settings {margin-bottom: 20px;background: white;padding: 15px;border-radius: 10px;display: inline-block;}
.settings select {padding: 5px 10px;font-size: 16px;border-radius: 5px;}
button{padding:12px 18px;border:none;border-radius:10px;cursor:pointer;background:#1e88e5;color:white;margin:6px;font-size:17px;}
button:hover{background:#1565c0;}
#game, #final-result {display:none;}
.progressText{font-weight:bold;margin-bottom:8px;}
.progress{width:100%;height:18px;background:#cfd8dc;border-radius:20px;overflow:hidden;margin-bottom:20px;}
#bar{width:0%;height:100%;background:#43a047;transition:.3s;}
.question{font-size:25px;font-weight:bold;margin:20px 0;}
.choice{display:block;width:100%;margin:10px 0;padding:14px;background:white;color:#222;border:2px solid #1e88e5;border-radius:10px;cursor:pointer;text-align:left;font-size:18px;}
.choice:hover{background:#e3f2fd;}
.correct{background:#43a047!important;color:white;}
.wrong{background:#e53935!important;color:white;}
#result{font-size:28px;font-weight:bold;margin-top:15px;}
#explain{margin-top:15px;background:#fff;padding:15px;border-left:5px solid orange;}
#next{display:none;width:100%;margin-top:20px;}
#final-result {text-align: center;background: white;padding: 30px;border-radius: 10px;box-shadow: 0 4px 6px rgba(0,0,0,0.1);}
.result-stats {font-size: 22px;margin: 15px 0;font-weight: bold;}
.result-rate {font-size: 28px;color: #e53935;margin: 15px 0;font-weight: bold;}
.result-point {font-size: 20px;color: #1e88e5;margin-bottom: 20px;}
</style>
</head>
<body>
<header>
<div>📚 一問一答マスター</div>
<div><a href="index.html">🏠ホーム</a> <span class="point">⭐ <span id="point">0</span>P</span></div>
</header>
<main>
<h1>📖 国語</h1>
<div class="menu" id="menu">
  <div class="settings">
    <label for="q-count"><b>出題数：</b></label>
    <select id="q-count">
      <option value="1">1問</option>
      <option value="5" selected>5問</option>
      <option value="10">10問</option>
      <option value="20">20問</option>
      <option value="30">30問</option>
      <option value="40">40問</option>
      <option value="50">50問</option>
    </select>
  </div>
  <h2>学年を選択してスタート</h2>
  <button onclick="start(1)">中1</button>
  <button onclick="start(2)">中2</button>
  <button onclick="start(3)">中3</button>
</div>

<div id="game">
  <div class="progressText" id="progressText"></div>
  <div class="progress"><div id="bar"></div></div>
  <div class="question" id="question"></div>
  <div id="choices"></div>
  <div id="result"></div>
  <div id="explain"></div>
  <button id="next" onclick="nextQuestion()">次の問題 ▶</button>
</div>

<div id="final-result">
  <h2>🎉 結果発表 🎉</h2>
  <div class="result-stats" id="final-score">正解数: 0 / 0問</div>
  <div class="result-rate" id="final-rate">正答率: 0%</div>
  <div class="result-point" id="final-earned-points">獲得ポイント: +0P</div>
  <button onclick="location.reload()">もう一回やる</button>
  <button onclick="location.href='index.html'" style="background: #757575;">ホームへ戻る</button>
</div>
</main>

    {q:"「走れ、走れ、ただひたすらに前へ。」に使われている表現技法はどれ？", c:["反復法", "省略法", "隠喩", "対句法"], a:0, ex:"同じ言葉を繰り返すことで、感情の高ぶりやその動作の勢いを強調する技法を「反復法（リフレイン）」と呼びます。"},
    {q:"現代の普通の言葉（話し言葉）を使い、五七五などの音数にとらわれずに自由に書かれた詩の形式はどれ？", c:["文語定型詩", "口語定型詩", "文語自由詩", "口語自由詩"], a:3, ex:"現代語（＝口語）を使い、リズムの決まりがない（＝自由）詩なので「口語自由詩」です。中学生が習う詩のほとんどがこの形式に該当します。"},
    {q:"昔の言葉（書き言葉）を使い、七五調などの一定のリズムを整えて書かれた詩の形式はどれ？", c:["文語定型詩", "口語自由詩", "文語自由詩", "口語定型詩"], a:0, ex:"昔の文法（＝文語）を使い、音数に決まりがある（＝定型）詩なので「文語定型詩」と呼びます。"},
    {q:"二字熟語「軽量」の漢字の構成（成り立ち）として正しいものはどれ？", c:["反対の意味の漢字が並んでいる", "上の漢字が下の漢字を修飾している", "似た意味の漢字が並んでいる", "下の漢字から上の漢字に返って読む"], a:2, ex:「軽」も「量（はかる、軽い）」も、どちらも重さや量を測る・軽いというニュアンスを持つ、似た意味の漢字を重ねて意味を補強している熟語です。"},
    {q:"二字熟語「勝敗」の漢字の構成（成り立ち）として正しいものはどれ？", c:["上の漢字が下の漢字を修飾している", "似た意味の漢字が並んでいる", "下の漢字から上の漢字に返って読む", "反対の意味の漢字が並んでいる"], a:3, ex:「勝つ」と「敗れる」という、完全に正反対の意味を持つ漢字を組み合わせることで、全体の勝負の結果という新しい概念を作っています。"},
    {q:"二字熟語「大雨」の漢字の構成（成り立ち）として正しいものはどれ？", c:["下の漢字から上の漢字に返って読む", "似た意味の漢字が並んでいる", "上の漢字が下の漢字を修飾している", "反対の意味の漢字が並んでいる"], a:2, ex:「大（大きい）」という言葉が、下の「雨」を詳しく説明（修飾）して「大きい雨」という意味の構造を作っています。"},
    {q:"二字熟語「読書」の漢字の構成（成り立ち）として正しいものはどれ？", c:["上の漢字が下の漢字を修飾している", "下の漢字から上の漢字に返って読む", "反対の意味の漢字が並んでいる", "似た意味の漢字が並んでいる"], a:1, ex:"日本語の語順に直したときに「書（ほん）を・読（よむ）」となり、下の字から上の字へ返って読む構造（動作＋目的語）になっています。"},
    {q:"ことわざ「犬も歩けば棒に当たる」の本来の正しい意味はどれ？", c:["じっとしていればトラブルに巻き込まれないという意味", "何か行動を起こせば、幸運または災難に出会うという意味", "犬を散歩させるときは怪我に気をつけるべきだという意味", "努力すれば必ず目標を達成できるという意味"], a:1, ex:もともとは「余計な行動が災難を招く」という意味でしたが、現代では「行動すれば思いがけない幸運に出会う」というプラスの意味でも使われます。"},
    {q:"ことわざ「猫に小判」と全く同じ意味（価値が分からない人には無意味）を持つ言葉はどれ？", c:["馬の耳に念仏", "犬も歩けば棒に当たる", "猿も木から落ちる", "弘法筆を選ばず"], a:0, ex:どちらも「どんなに価値やありがたみのあるものを与えても、本人がそれを理解できなければ全く役に立たない」という人間の認知の限界を表した言葉です。"},
    {q:"慣用句「頭をひねる」の意味として最も適切なものはどれ？", c:["物理的に首を傾げて体操をすること", "相手の意見に納得がいかず、不満を表すこと", "記憶が思い出せず、完全に諦めること", "良いアイデアを出そうと、一生懸命に考えること"], a:3, ex:難問を解決しようとしたり、工夫を凝らしたりするために、脳をフル回転させて集中して考える様子を比喩的に表した言葉です。"},
    {q:"慣用句「さじを投げる」の意味として最も適切なものはどれ？", c:["食事が終わったので片付けること", "これ以上やっても見込みがないと、諦めること", "相手に対して怒りを爆発させること", "新しい方法に果敢に挑戦すること"], a:1, ex:もともと医者が薬を調合する「さじ」を置き、病気の治療を諦めたことが由来です。物事の見込みがないと見切る実践的な諦めを指します。"},
    {q:"故事成語「矛盾（むじゅん）」の由来となったエピソードで、商人が売っていた２つの武器は何と何？", c:["刀と鞘（さや）", "弓と矢", "矛（ほこ）と盾（たて）", "槍（やり）と鎧（よろい）"], a:2, ex:「どんな盾も突き通す矛」と「どんな矛も防ぐ盾」を同時に売ろうとして、つじつまが合わなくなった中国の歴史話が由来です。"},
    {q:"故事成語「蛇足（だそく）」の意味として最も適切なものはどれ？", c:["あっても意味がなく、かえって邪魔になる余計なもののこと", "足が速くて誰も追いつけないこと", "見かけは怖そうだが、実際は弱いもののこと", "物事の準備を最初からやり直すこと"], a:0, ex:蛇の絵を早く描く競争で、早く描き終わった人が余計に「足」を描き足したせいで負けてしまったというエピソードが由来です。"},
    {q:"故事成語「推敲（すいこう）」とは、文章を何度も練り直すことですが、由来となった詩人が迷った二つの行動はどれ？", c:["「開く」と「閉じる」", "「押す」と「叩く」", "「行く」と「帰る」", "「見る」と「聞く」"], a:1, ex:詩の中の言葉を「門を推（お）す」にするか「門を敲（たた）く」にするかで、どちらの動詞が響きとして美しいか悩み抜いた話が由来です。"},
    {q:"「主観（自分の視点だけで見ること）」の対義語として最も適切な言葉はどれ？", c:["直感", "偏見", "達観", "客観"], a:3, ex:「主観」が自分だけの基準であるのに対し、「客観」は第三者の立場から冷静に、誰もが納得できる共通の事実ベースで物事を見ることを指します。"},
    {q:"敬語の分類で、相手を敬って「相手の動作」を高めて表現する敬語はどれ？", c:["丁寧語", "謙譲語", "尊敬語", "美化語"], a:2, ex:主語が「先生」や「先輩」など、高めるべき相手のときに使うのが「尊敬語」です（例：先生がおっしゃる）。自分が主語のときは「謙譲語」を使います。"},
    {q:"文章を読むとき、「事実」と「意見」を区別することは重要です。次のうち『意見』にあたる文はどれ？", c:["今日の最高気温は25度だった。", "この本は100ページで構成されている。", "私は、このデザインが一番美しいと思う。", "日本の首都は東京である。"], a:2, ex:「〜と思う」「〜ではないだろうか」のように、書き手の主観的な考えや判断が含まれる文が「意見」です。他の選択肢はデータで証明できる「事実」です。"},
    {q:"漢字「語」の部首の名前として正しいものはどれ？", c:["ごんべん", "にんべん", "きへん", "さんずい"], a:0, ex:言葉や話すことに関する漢字には、左側に「言（ことば）」が変形した「ごんべん」が使われます。部首は漢字の意味を推測する強力な手がかりです。"},
    {q:"漢字の読み方で、昔の中国の読みに由来するものを「音読み」と言います。「山」を「サン」と読むのはどちら？", c:["訓読み", "どちらでもない", "特別な読み（熟字訓）", "音読み"], a:3, ex:「サン」のように、それ単体では日本語として意味が分かりにくく、熟語（火山など）でよく使われるのが「音読み」の特徴です。単体で意味が分かる「やま」は訓読みです。"},
    {q:"「学校」という単語を「自立語（それだけで意味が通じる）」と「付属語（それだけでは通じない）」に分けるとどちら？", c:["自立語", "付属語", "どちらにも属さない", "活用語"], a:0, ex:「学校」は、頭の中で具体的な建物のイメージが浮かぶため、単独で意味が成立する「自立語」に分類されます（品詞は名詞）。"},
    {q:"次のうち、後ろに「ない」をつけたときに「活用（言葉の形が変わる）」する品詞はどれ？", c:["名詞", "動詞", "副詞", "接続詞"], a:1, ex:動詞「書く」は、「書か・ない」のように後ろに続く言葉によって形が変わるため「活用がある言葉」に分類されます。名詞や副詞は形が変わりません。"},
    {q:"原稿用紙の使い方で、会話文を表す「かぎ括弧（「 ）」を書き始める位置として正しいルールはどれ？", c:["必ず行の最後のマスに書く", "行の最初のマス（行頭）に、1マス空けずに書く", "行頭を2マス空けてから書く", "前の文のすぐ後ろに続けて書く"], a:1, ex:会話文の書き始めは、原則として新しい行にし、行頭の1マス目に「「」を書きます。通常の文のように1マス空ける必要はありません。行頭に置くことで会話の視認性を高めるルールです。"},
    {q:"国語辞典で「さくら」と「さかな」を調べるとき、どちらが先に掲載されている？", c:["さくら", "さかな", "同時に載っている", "辞書によって完全に異なる"], a:1, ex:辞書は五十音順（あいうえお順）で並んでいます。1文字目「さ」は同じ、2文字目を比べると「か」は「く」よりも先にあるため、「さかな」が先に出てきます。"},
    {q:"「（ ）を濁す」という慣用句の（ ）に入る、曖昧な態度でその場をごまかす意味を持つ言葉はどれ？", c:["お茶", "水", "言葉", "濁り"], a:0, ex:「お茶を濁す（おちゃをにごす）」と言います。もともとは茶道の作法を知らない人が、適当にお茶をかき混ぜて濁らせ、その場を取り繕ったエピソードが由来です。"}
  ],

function start(g) {
  current = 0; correctCount = 0; answered = false;
  const count = Number(document.getElementById("q-count").value);
  let allQuestions = [...db[g]];
  questions = allQuestions.sort(() => Math.random() - 0.5).slice(0, Math.min(count, allQuestions.length));
  document.getElementById("menu").style.display = "none";
  document.getElementById("game").style.display = "block";
  showQuestion();
}

function showQuestion() {
  answered = false;
  let q = questions[current];
  document.getElementById("progressText").innerHTML = `問題 ${current + 1} / ${questions.length}`;
  document.getElementById("bar").style.width = `${(current + 1) / questions.length * 100}%`;
  document.getElementById("question").innerHTML = q.q;
  document.getElementById("choices").innerHTML = q.c.map((c, i) => `<button class="choice" onclick="answer(${i})">${c}</button>`).join("");
  document.getElementById("result").innerHTML = "";
  document.getElementById("explain").innerHTML = "";
  document.getElementById("next").style.display = "none";
}

function answer(select) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  document.querySelectorAll(".choice").forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.a) btn.classList.add("correct");
    else if (i === select) btn.classList.add("wrong");
  });
  if (select === q.a) {
    document.getElementById("result").innerHTML = "⭕ 正解！ +2P";
    correctCount++;
    point += 2;
    localStorage.setItem("point", point);
    pointText.textContent = point;
  } else {
    document.getElementById("result").innerHTML = "❌ 不正解";
  }
  document.getElementById("explain").innerHTML = `<b>解説</b><br>${q.ex}`;
  document.getElementById("next").style.display = "block";
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    document.getElementById("game").style.display = "none";
    document.getElementById("final-result").style.display = "block";
    document.getElementById("final-score").innerHTML = `正解数: ${correctCount} / ${questions.length}問`;
    document.getElementById("final-rate").innerHTML = `正答率: ${Math.round(correctCount / questions.length * 100)}%`;
    document.getElementById("final-earned-points").innerHTML = `獲得ポイント: +${correctCount * 2}P`;
  } else { showQuestion(); }
}
