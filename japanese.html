<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>国語 | 一問一答マスター</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:"Yu Gothic",sans-serif;}
    body{background:#fdf6e3;} /* 国語らしい落ち着いた配色 */
    header{height:60px;background:#5d4037;color:#fff;display:flex;justify-content:space-between;align-items:center;padding:0 20px;}
    header a{color:white;text-decoration:none;font-weight:bold;}
    .point{background:white;color:#5d4037;padding:8px 15px;border-radius:10px;font-weight:bold;}
    main{max-width:800px;margin:25px auto;padding:20px;}
    h1{text-align:center;margin-bottom:20px;color:#3e2723;}
    .menu{text-align:center;background:white;padding:30px;border-radius:15px;box-shadow:0 4px 6px rgba(0,0,0,0.1);}
    button{padding:15px 25px;border:none;border-radius:10px;cursor:pointer;background:#8d6e63;color:white;margin:10px;font-size:18px;}
    button:hover{background:#6d4c41;}
    #game{display:none;}
    .question{font-size:24px;font-weight:bold;margin:20px 0;background:#fff;padding:20px;border-radius:10px;border-left:5px solid #8d6e63;}
    .choice{display:block;width:100%;margin:10px 0;padding:15px;background:white;border:2px solid #8d6e63;border-radius:10px;cursor:pointer;text-align:left;font-size:18px;}
    .choice:hover{background:#efebe9;}
    .correct{background:#66bb6a!important;color:white;}
    .wrong{background:#ef5350!important;color:white;}
    #explain{margin-top:20px;background:#fff8e1;padding:20px;border-radius:10px;border-left:5px solid #ffca28;}
    #next{display:block;width:100%;margin-top:20px;padding:15px;background:#5d4037;}
</style>
</head>
<body>
<header><div>📚 国語 一問一答</div><div><span class="point">⭐ <span id="point">0</span>P</span></div></header>
<main>
    <h1>📖 国語</h1>
    <div class="menu" id="menu">
        <h2>学年を選択してスタート</h2>
        <button onclick="start(1)">中1 国語</button>
        <button onclick="start(2)">中2 国語</button>
        <button onclick="start(3)">中3 国語</button>
    </div>

    <div id="game">
        <div id="question" class="question"></div>
        <div id="choices"></div>
        <div id="result" style="font-size:22px;font-weight:bold;margin:15px 0;"></div>
        <div id="explain"></div>
        <button id="next" onclick="nextQuestion()" style="display:none;">次の問題 ▶</button>
    </div>
</main>

<script>
const db = {
    1: [{q:"「山月記」の作者は？", c:["芥川龍之介","中島敦","夏目漱石","太宰治"], a:1, ex:"李徴という男が虎になる話です。"}, {q:"「平家物語」の冒頭は？", c:["春はあけぼの","祇園精舎の鐘の声","月日は百代の過客にして","吾輩は猫である"], a:1, ex:"諸行無常の響きあり。"}],
    2: [{q:"「羅生門」の作者は？", c:["芥川龍之介","中島敦","夏目漱石","太宰治"], a:0, ex:"下人の極限状態を描いています。"}, {q:"「走れメロス」の舞台は？", c:["シラクサ","ローマ","ギリシャ","パリ"], a:0, ex:"古代シラクサの王様の話。"}],
    3: [{q:"「こころ」の作者は？", c:["夏目漱石","芥川龍之介","太宰治","森鴎外"], a:0, ex:"明治の終わりを描いた名作です。"}, {q:"「銀河鉄道の夜」の作者は？", c:["宮沢賢治","太宰治","夏目漱石","芥川龍之介"], a:0, ex:"イーハトーブが舞台です。"}]
};

let current = 0, answered = false, questions = [], point = Number(localStorage.getItem("point")) || 0;
document.getElementById("point").textContent = point;

function start(g) {
    questions = db[g].sort(() => Math.random() - 0.5);
    document.getElementById("menu").style.display = "none";
    document.getElementById("game").style.display = "block";
    show();
}

function show() {
    answered = false;
    let q = questions[current];
    document.getElementById("question").textContent = q.q;
    document.getElementById("choices").innerHTML = q.c.map((c, i) => `<button class="choice" onclick="check(${i})">${c}</button>`).join("");
    document.getElementById("result").textContent = "";
    document.getElementById("explain").innerHTML = "";
    document.getElementById("next").style.display = "none";
}

function check(sel) {
    if (answered) return;
    answered = true;
    let q = questions[current];
    document.querySelectorAll(".choice").forEach((b, i) => {
        b.disabled = true;
        if(i === q.a) b.classList.add("correct");
        else if(i === sel) b.classList.add("wrong");
    });
    document.getElementById("result").textContent = (sel === q.a) ? "⭕ 正解！" : "❌ 不正解";
    document.getElementById("explain").innerHTML = "<b>解説:</b><br>" + q.ex;
    if(sel === q.a) { point += 2; localStorage.setItem("point", point); document.getElementById("point").textContent = point; }
    document.getElementById("next").style.display = "block";
}

function nextQuestion() {
    current++;
    if (current < questions.length) show();
    else { alert("終了！ホームに戻ります"); location.reload(); }
}
</script>
</body>
</html>
